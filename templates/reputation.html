<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سمعتي - Study Hub AI</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: rgba(17,24,39,0.95); border-radius: 30px; padding: 20px 30px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .header h1 { color: #fbbf24; display: flex; align-items: center; gap: 10px; }
        .back-btn { background: #4f46e5; color: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; }
        
        .reputation-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .rep-card { background: #111827; border-radius: 25px; padding: 25px; text-align: center; border: 1px solid #1f2937; transition: 0.3s; }
        .rep-number { font-size: 48px; font-weight: bold; background: linear-gradient(135deg, #fbbf24, #f97316); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .rep-label { color: #9ca3af; margin-top: 10px; }
        
        .level-progress { background: #1e293b; border-radius: 20px; height: 20px; margin: 15px 0; overflow: hidden; }
        .level-fill { background: linear-gradient(95deg, #10b981, #fbbf24); height: 20px; border-radius: 20px; transition: width 0.5s; }
        
        .restriction-alert { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; border-radius: 20px; padding: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .warning { background: rgba(245,158,11,0.2); border-color: #f59e0b; }
        .normal { background: rgba(16,185,129,0.2); border-color: #10b981; }
        
        .history-list { background: #111827; border-radius: 25px; padding: 25px; margin-top: 20px; }
        .history-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #1f2937; }
        
        @media (max-width: 700px) { .reputation-cards { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-star-of-life"></i> ⭐ سمعتي الأكاديمية</h1>
        <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-right"></i> العودة</a>
    </div>

    <div id="restrictionAlert" class="restriction-alert normal" style="display: none;"></div>

    <div class="reputation-cards">
        <div class="rep-card"><div class="rep-number" id="trustScore">-</div><div class="rep-label"><i class="fas fa-shield-alt"></i> درجة الثقة</div><div class="level-progress"><div id="trustBar" class="level-fill" style="width: 0%;"></div></div></div>
        <div class="rep-card"><div class="rep-number" id="behaviorScore">-</div><div class="rep-label"><i class="fas fa-hand-peace"></i> السلوك</div><div class="level-progress"><div id="behaviorBar" class="level-fill" style="width: 0%;"></div></div></div>
        <div class="rep-card"><div class="rep-number" id="academicScore">-</div><div class="rep-label"><i class="fas fa-graduation-cap"></i> السمعة الأكاديمية</div><div class="level-progress"><div id="academicBar" class="level-fill" style="width: 0%;"></div></div></div>
    </div>

    <div class="reputation-cards">
        <div class="rep-card"><div class="rep-number" id="completedSessions">0</div><div class="rep-label"><i class="fas fa-check-circle"></i> جلسات مكتملة</div></div>
        <div class="rep-card"><div class="rep-number" id="cancelledSessions">0</div><div class="rep-label"><i class="fas fa-times-circle"></i> جلسات ملغية</div></div>
        <div class="rep-card"><div class="rep-number" id="reportsReceived">0</div><div class="rep-label"><i class="fas fa-flag"></i> بلاغات مستلمة</div></div>
    </div>

    <div class="history-list">
        <h3 style="color: #fbbf24; margin-bottom: 15px;"><i class="fas fa-history"></i> سجل التحديثات</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
    async function loadReputation() {
        try {
            const response = await fetch('/api/study/reputation');
            const data = await response.json();
            
            document.getElementById('trustScore').innerHTML = data.trust_score || 0;
            document.getElementById('behaviorScore').innerHTML = data.behavior_score || 0;
            document.getElementById('academicScore').innerHTML = data.academic_reputation || 0;
            document.getElementById('trustBar').style.width = `${data.trust_score || 0}%`;
            document.getElementById('behaviorBar').style.width = `${data.behavior_score || 0}%`;
            document.getElementById('academicBar').style.width = `${data.academic_reputation || 0}%`;
            document.getElementById('completedSessions').innerHTML = data.completed_sessions || 0;
            document.getElementById('cancelledSessions').innerHTML = data.cancelled_sessions || 0;
            document.getElementById('reportsReceived').innerHTML = data.reports_received || 0;
            
            // Restriction alert
            const alertDiv = document.getElementById('restrictionAlert');
            if (data.restriction_level >= 3) {
                alertDiv.style.display = 'flex';
                alertDiv.className = 'restriction-alert';
                alertDiv.innerHTML = `<i class="fas fa-ban" style="font-size: 32px;"></i><div><strong>⚠️ حسابك مقيد مؤقتاً</strong><br>لا يمكنك إرسال طلبات مذاكرة جديدة حتى ${new Date(data.restricted_until).toLocaleDateString('ar-EG')}.<br>للتواصل مع الدعم: admin@studyhub.com</div>`;
            } else if (data.restriction_level >= 2) {
                alertDiv.style.display = 'flex';
                alertDiv.className = 'restriction-alert warning';
                alertDiv.innerHTML = `<i class="fas fa-clock" style="font-size: 32px;"></i><div><strong>⚠️ تحذير</strong><br>حسابك تحت المراقبة. الرجاء الالتزام بإرشادات المنصة.</div>`;
            } else {
                alertDiv.style.display = 'none';
            }
            
            // Load history
            if (data.history) {
                const historyDiv = document.getElementById('historyList');
                historyDiv.innerHTML = data.history.map(h => `
                    <div class="history-item">
                        <span>${h.event}</span>
                        <span style="color: ${h.points > 0 ? '#10b981' : '#ef4444'}">${h.points > 0 ? `+${h.points}` : h.points}</span>
                        <span style="color: #6b7280; font-size: 12px;">${h.date}</span>
                    </div>
                `).join('');
            }
        } catch(e) { console.error(e); }
    }
    
    loadReputation();
    setInterval(loadReputation, 30000);
</script>
</body>
</html>
