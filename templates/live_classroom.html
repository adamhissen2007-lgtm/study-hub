<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة تعليمية مباشرة - Study Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #0f172a; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* الشريط العلوي */
        .top-bar {
            background: #1e293b;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            flex-wrap: wrap;
            gap: 10px;
        }
        .room-title { color: white; font-weight: bold; font-size: 18px; }
        .room-title i { color: #fbbf24; margin-left: 8px; }
        .room-link-box {
            background: #0f172a;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            color: #94a3b8;
            direction: ltr;
        }
        .exit-btn { background: #ef4444; color: white; padding: 6px 16px; border-radius: 30px; text-decoration: none; font-size: 13px; }
        
        /* المحتوى الرئيسي */
        .main-content { display: flex; flex: 1; overflow: hidden; }
        
        /* منطقة السبورة */
        .board-area {
            flex: 3;
            position: relative;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }
        #whiteboardCanvas {
            width: 100%;
            flex: 1;
            cursor: crosshair;
            background: white;
        }
        .tools {
            background: #1e293b;
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-top: 1px solid #334155;
        }
        .tool-btn {
            background: #334155;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .tool-btn:hover { background: #4f46e5; transform: scale(1.05); }
        .tool-btn.active { background: #4f46e5; border: 1px solid #fbbf24; }
        .tool-color { width: 38px; height: 38px; border-radius: 12px; border: 2px solid white; cursor: pointer; }
        
        /* الكاميرا */
        .video-self {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 160px;
            border-radius: 16px;
            border: 2px solid #4f46e5;
            display: none;
            background: black;
            z-index: 20;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .video-self video { width: 100%; border-radius: 14px; }
        
        /* منطقة الدردشة */
        .chat-area {
            width: 320px;
            background: #1e293b;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #334155;
        }
        .chat-header {
            padding: 12px;
            border-bottom: 1px solid #334155;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            background: #0f172a;
            padding: 8px 12px;
            border-radius: 16px;
            color: #e2e8f0;
            font-size: 13px;
            max-width: 85%;
        }
        .message.own { background: #4f46e5; align-self: flex-end; }
        .message strong { color: #fbbf24; }
        .chat-input {
            display: flex;
            padding: 12px;
            gap: 8px;
            border-top: 1px solid #334155;
        }
        .chat-input input {
            flex: 1;
            background: #0f172a;
            border: none;
            padding: 10px 14px;
            border-radius: 30px;
            color: white;
        }
        .chat-input button {
            background: #4f46e5;
            border: none;
            width: 40px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }
        
        /* أزرار الإجراءات */
        .action-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #334155;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .action-btn:hover { transform: translateY(-2px); }
        .action-btn.video { background: #10b981; }
        .action-btn.danger { background: #ef4444; }
        .action-btn.warning { background: #f59e0b; }
        
        /* قائمة المشاركين */
        .participants-list {
            padding: 10px;
            border-top: 1px solid #334155;
            max-height: 120px;
            overflow-y: auto;
        }
        .participant {
            color: #94a3b8;
            font-size: 11px;
            padding: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        @media (max-width: 800px) {
            .chat-area { width: 260px; }
            .video-self { width: 120px; bottom: 70px; }
        }
    </style>
</head>
<body>
<div class="top-bar">
    <div class="room-title">
        <i class="fas fa-chalkboard-teacher"></i> غرفة: {{ room_name }}
        <div class="room-link-box" id="roomLinkBox" style="margin-right: 15px; font-size: 11px;">
            <i class="fas fa-link"></i> <span id="roomLinkText">جاري التحميل...</span>
        </div>
    </div>
    <div class="action-buttons">
        <button id="shareLinkBtn" class="action-btn warning"><i class="fas fa-share-alt"></i> مشاركة الرابط</button>
        <button id="cameraBtn" class="action-btn video"><i class="fas fa-video"></i> تشغيل الكاميرا</button>
        <button id="uploadFileBtn" class="action-btn"><i class="fas fa-file-pdf"></i> رفع ملف للشرح</button>
        <a href="/dashboard" class="exit-btn"><i class="fas fa-sign-out-alt"></i> خروج</a>
    </div>
</div>

<div class="main-content">
    <div class="board-area">
        <canvas id="whiteboardCanvas"></canvas>
        <div class="tools">
            <button class="tool-btn" data-tool="pen"><i class="fas fa-pen"></i></button>
            <button class="tool-btn" data-tool="eraser"><i class="fas fa-eraser"></i></button>
            <input type="color" id="colorPicker" value="#000000" class="tool-color">
            <button id="clearCanvas" class="tool-btn"><i class="fas fa-trash"></i></button>
            <button id="saveCanvas" class="tool-btn"><i class="fas fa-save"></i></button>
        </div>
        <div id="videoSelf" class="video-self">
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
    </div>
    <div class="chat-area">
        <div class="chat-header">
            <span><i class="fas fa-comments"></i> الدردشة المباشرة</span>
            <span id="onlineCount" style="background:#4f46e5; padding:2px 8px; border-radius:20px; font-size:11px;">0</span>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message"><strong>النظام</strong><br>✨ مرحباً بك في الغرفة التعليمية! يمكنك الرسم والدردشة ومشاركة الكاميرا.</div>
        </div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="اكتب رسالة للطلبة...">
            <button id="sendChatBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div class="participants-list" id="participantsList">
            <div class="participant"><i class="fas fa-circle"></i> جاري التحميل...</div>
        </div>
    </div>
</div>

<script>
    // ========== 1. إعدادات السبورة ==========
    const canvas = document.getElementById('whiteboardCanvas');
    const ctx = canvas.getContext('2d');
    let painting = false;
    let currentTool = 'pen';
    let currentColor = '#000000';
    let lastX = 0, lastY = 0;
    
    function resizeCanvas() {
        const container = canvas.parentElement;
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight - 60;
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    function getCoordinates(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
        else { clientX = e.clientX; clientY = e.clientY; }
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }
    
    function draw(e) {
        if (!painting) return;
        const { x, y } = getCoordinates(e);
        ctx.strokeStyle = currentTool === 'eraser' ? 'white' : currentColor;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
        lastX = x; lastY = y;
    }
    
    function startDraw(e) {
        painting = true;
        const { x, y } = getCoordinates(e);
        lastX = x; lastY = y;
        ctx.beginPath();
        draw(e);
    }
    function endDraw() { painting = false; }
    
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', endDraw);
    
    document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTool = btn.dataset.tool;
        });
    });
    document.getElementById('colorPicker').addEventListener('input', (e) => { currentColor = e.target.value; });
    document.getElementById('clearCanvas').addEventListener('click', () => {
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    });
    document.getElementById('saveCanvas').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'whiteboard.png';
        link.href = canvas.toDataURL();
        link.click();
    });
    
    // ========== 2. الاتصال بالـ Socket والمشاركين والدردشة ==========
    const socket = io();
    const username = '{{ session.get("user_name", "طالب") }}';
    const roomId = '{{ room_id }}';
    
    socket.emit('join_classroom', { room: roomId, username: username });
    
    // رابط الغرفة للنسخ
    const roomFullUrl = window.location.href;
    document.getElementById('roomLinkText').innerText = roomFullUrl;
    document.getElementById('shareLinkBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(roomFullUrl);
        addMessage('النظام', '✅ تم نسخ رابط الغرفة! أرسله للطلاب للانضمام.', false);
    });
    
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    
    function addMessage(sender, message, isOwn = false) {
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : ''}`;
        div.innerHTML = isOwn ? `<strong>أنت</strong><br>${message}` : `<strong>${sender}</strong><br>${message}`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    document.getElementById('sendChatBtn').addEventListener('click', () => {
        const msg = chatInput.value.trim();
        if(!msg) return;
        socket.emit('chat_message', { room: roomId, message: msg, username: username });
        addMessage('أنت', msg, true);
        chatInput.value = '';
    });
    
    chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('sendChatBtn').click(); });
    
    socket.on('chat_message', (data) => {
        if(data.username !== username) {
            addMessage(data.username, data.message, false);
        }
    });
    
    socket.on('participants_update', (data) => {
        const container = document.getElementById('participantsList');
        document.getElementById('onlineCount').innerText = data.count;
        if(data.participants && data.participants.length) {
            container.innerHTML = data.participants.map(p => `<div class="participant"><i class="fas fa-circle"></i> ${escapeHtml(p)}</div>`).join('');
        } else {
            container.innerHTML = '<div class="participant"><i class="fas fa-circle"></i> أنت فقط</div>';
        }
    });
    
    // ========== 3. الكاميرا (مظبوطة) ==========
    const cameraBtn = document.getElementById('cameraBtn');
    const videoSelf = document.getElementById('videoSelf');
    const localVideo = document.getElementById('localVideo');
    let localStream = null;
    
    cameraBtn.addEventListener('click', async () => {
        if(localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
            videoSelf.style.display = 'none';
            cameraBtn.innerHTML = '<i class="fas fa-video"></i> تشغيل الكاميرا';
            cameraBtn.style.background = '#10b981';
            socket.emit('stop_video', { room: roomId });
            return;
        }
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = localStream;
            videoSelf.style.display = 'block';
            cameraBtn.innerHTML = '<i class="fas fa-stop"></i> إيقاف الكاميرا';
            cameraBtn.style.background = '#ef4444';
            socket.emit('start_video', { room: roomId });
            addMessage('النظام', '✅ تم تشغيل الكاميرا والميكروفون', false);
        } catch(e) {
            addMessage('النظام', '❌ لا يمكن الوصول للكاميرا: ' + e.message, false);
        }
    });
    
    // ========== 4. رفع الملفات (مظبوطة وبتشتغل) ==========
    document.getElementById('uploadFileBtn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,application/pdf';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            addMessage('النظام', `📤 جاري رفع ${file.name}...`, false);
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('/api/upload-temp-file', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if(data.url) {
                    if(file.type.startsWith('image/')) {
                        const img = new Image();
                        img.src = data.url;
                        img.onload = () => {
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            addMessage('النظام', `✅ تم رفع ${file.name} وعرضه على السبورة`, false);
                        };
                    } else if(file.type === 'application/pdf') {
                        addMessage('النظام', `📄 تم رفع ${file.name}. سيتم فتحه في علامة تبويب جديدة للشرح.`, false);
                        window.open(data.url, '_blank');
                    }
                } else {
                    addMessage('النظام', '❌ فشل رفع الملف', false);
                }
            } catch(err) {
                addMessage('النظام', '❌ خطأ في رفع الملف: ' + err.message, false);
            }
        };
        input.click();
    });
    
    // ========== دوال مساعدة ==========
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
</script>
</body>
</html>
