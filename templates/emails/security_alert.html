<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تنبيه أمني - Study Hub</title>
</head>
<body style="background:#0f172a; font-family:'Tajawal', sans-serif; padding:40px;">
    <div style="max-width:500px; margin:auto; background:#1e293b; border-radius:32px; padding:30px; text-align:center;">
        <h1 style="color:#ef4444;">⚠️ تنبيه أمني</h1>
        <p style="color:#94a3b8;">تم تسجيل الدخول إلى حسابك من جهاز جديد.</p>
        <div style="background:#0f172a; padding:15px; border-radius:16px; margin:15px 0;">
            <p style="color:#fbbf24;"><strong>الجهاز:</strong> {{ device }}</p>
            <p style="color:#fbbf24;"><strong>عنوان IP:</strong> {{ ip }}</p>
            <p style="color:#fbbf24;"><strong>التاريخ والوقت:</strong> {{ time }}</p>
        </div>
        <p style="color:#94a3b8;">إذا لم تكن أنت، يرجى تغيير كلمة المرور فوراً.</p>
        <a href="{{ url_for('reset_password_request', _external=True) }}" style="display:inline-block; background:#ef4444; color:white; padding:12px 30px; border-radius:40px; text-decoration:none; margin:20px 0;">تغيير كلمة المرور</a>
    </div>
</body>
</html>
