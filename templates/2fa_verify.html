<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>التحقق بخطوتين - Study Hub</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #8b5cf6;
            text-align: center;
        }
        h1 { color: #fbbf24; margin-bottom: 20px; }
        p { color: #9ca3af; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
        }
        button {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .error {
            color: #ef4444;
            margin-bottom: 15px;
        }
        a { color: #8b5cf6; text-decoration: none; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 التحقق بخطوتين</h1>
        <p>أدخل الرمز من تطبيق Google Authenticator</p>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/2fa/verify">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="code" placeholder="000000" maxlength="6" autocomplete="off" required>
            <button type="submit">تحقق</button>
        </form>
        <a href="/login">← العودة لتسجيل الدخول</a>
    </div>
</body>
</html>
