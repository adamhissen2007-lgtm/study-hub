<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإنشاء الذكي - Study Hub AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid rgba(99,102,241,0.3);
        }

        .header h1 {
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i {
            color: #fbbf24;
        }

        .header a {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .header a:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        /* بطاقة الإدخال */
        .input-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 35px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .input-card h2 {
            color: #fbbf24;
            margin-bottom: 20px;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-card textarea {
            width: 100%;
            height: 150px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 24px;
            padding: 18px;
            color: white;
            font-size: 16px;
            resize: vertical;
            transition: all 0.3s;
        }

        .input-card textarea:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(99,102,241,0.3);
        }

        .input-card button {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            padding: 14px 35px;
            border-radius: 60px;
            color: black;
            font-weight: 800;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .input-card button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(251,191,36,0.4);
        }

        /* أمثلة سريعة */
        .examples {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .example-btn {
            background: #1e293b;
            border: 1px solid #4f46e5;
            padding: 8px 18px;
            border-radius: 50px;
            color: #c084fc;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .example-btn:hover {
            background: #4f46e5;
            color: white;
        }

        /* نتيجة التوليد */
        .result-card {
            background: rgba(255,255,255,0.03);
            border-radius: 40px;
            padding: 25px;
            display: none;
            border: 1px solid rgba(99,102,241,0.2);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .result-header h3 {
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-header button {
            background: #334155;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-header button:hover {
            background: #4f46e5;
        }

        .result-frame {
            width: 100%;
            min-height: 500px;
            border: none;
            border-radius: 24px;
            background: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #fbbf24;
            display: none;
        }

        .loading i {
            font-size: 40px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- الهيدر -->
    <div class="header">
        <h1><i class="fas fa-wand-magic"></i> Generative UI - صمم واجهتك بالذكاء</h1>
        <a href="/dashboard"><i class="fas fa-arrow-right"></i> العودة للوحة</a>
    </div>

    <!-- منطقة الإدخال -->
    <div class="input-card">
        <h2><i class="fas fa-comment-dots"></i> أخبرني ماذا تريد، وسأخلقه لك</h2>
        <textarea id="userRequest" placeholder="📝 مثال: عايز اختبار تفاعلي من 3 أسئلة في الفيزياء، كل سؤال اختيار من متعدد، ويظهر النتيجة في الآخر"></textarea>
        <button onclick="generateUI()"><i class="fas fa-magic"></i> توليد الواجهة</button>

        <div class="examples">
            <button class="example-btn" onclick="setExample('اختبار في الرياضيات: 3 أسئلة، صح أو خطأ')">📝 اختبار رياضيات</button>
            <button class="example-btn" onclick="setExample('عرض إحصائيات درجاتي: رسم بياني بسيط للمواد')">📊 رسم بياني</button>
            <button class="example-btn" onclick="setExample('بطاقة تعريف بمادة الكيمياء: عنوان، وصف، صورة رمزية')">🎴 بطاقة تعريف</button>
            <button class="example-btn" onclick="setExample('سبورة ملاحظات: منطقة للكتابة، زر حفظ، عرض الملاحظات المحفوظة')">📝 سبورة ملاحظات</button>
            <button class="example-btn" onclick="setExample('عداد تنازلي للمذاكرة مع موسيقى هادئة')">⏱️ مؤقت مذاكرة</button>
        </div>
    </div>

    <!-- شاشة التحميل -->
    <div id="loading" class="loading">
        <i class="fas fa-spinner fa-pulse"></i>
        <p>جاري توليد واجهتك بالذكاء الاصطناعي...</p>
    </div>

    <!-- نتيجة التوليد -->
    <div id="resultCard" class="result-card">
        <div class="result-header">
            <h3><i class="fas fa-check-circle"></i> واجهتك جاهزة</h3>
            <button onclick="copyResult()"><i class="fas fa-copy"></i> نسخ الكود</button>
        </div>
        <iframe id="resultFrame" class="result-frame" srcdoc="<html><body style='padding:20px;background:#0f172a;color:white;'></body></html>"></iframe>
    </div>
</div>

<script>
    async function generateUI() {
        const request = document.getElementById('userRequest').value.trim();
        if (!request) {
            alert('من فضلك اكتب طلبك أولاً');
            return;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultCard').style.display = 'none';

        try {
            const response = await fetch('/api/generate-ui', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ request: request })
            });
            const data = await response.json();

            if (data.html) {
                let cleanHtml = data.html;
                if (cleanHtml.includes('<body')) {
                    const bodyMatch = cleanHtml.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
                    if (bodyMatch) cleanHtml = bodyMatch[1];
                }
                const fullHtml = `<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Tajawal&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Tajawal',sans-serif;background:#0f172a;color:#e2e8f0;padding:20px;}button,input,select{background:#1e293b;border:1px solid #4f46e5;border-radius:12px;padding:8px 16px;color:white;margin:5px;}button{background:#4f46e5;cursor:pointer;transition:0.2s;}button:hover{background:#6366f1;}input:focus,select:focus{outline:none;border-color:#fbbf24;}</style></head><body dir="rtl">${cleanHtml}</body></html>`;
                document.getElementById('resultFrame').srcdoc = fullHtml;
                document.getElementById('resultCard').style.display = 'block';
            } else {
                alert('حدث خطأ في توليد الواجهة');
            }
        } catch (error) {
            alert('خطأ في الاتصال: ' + error.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function setExample(text) {
        document.getElementById('userRequest').value = text;
        generateUI();
    }

    function copyResult() {
        const iframe = document.getElementById('resultFrame');
        const html = iframe.srcdoc;
        navigator.clipboard.writeText(html);
        alert('✅ تم نسخ كود الواجهة بنجاح!');
    }
</script>
</body>
</html>
