<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيت كلمة المرور - Study Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            padding: 20px;
        }
        .reset-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            border: 1px solid rgba(99,102,241,0.3);
        }
        h1 {
            font-size: 28px;
            text-align: center;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
        }
        .input-group { margin-bottom: 20px; }
        label { display: block; color: #c084fc; margin-bottom: 8px; font-weight: 600; }
        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 30px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.02); }
        .footer { text-align: center; margin-top: 20px; color: #94a3b8; }
        .footer a { color: #c084fc; text-decoration: none; }
        .error { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; padding: 10px; border-radius: 20px; color: #fca5a5; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
<div class="reset-card">
    <h1><i class="fas fa-key"></i> نسيت كلمة المرور</h1>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    
    <form method="POST">
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
            <input type="email" name="email" required placeholder="student@university.edu.eg">
        </div>
        <button type="submit"><i class="fas fa-paper-plane"></i> إرسال رابط إعادة التعيين</button>
    </form>
    
    <div class="footer">
        <a href="/login">تذكرت كلمة المرور؟ تسجيل الدخول</a>
    </div>
</div>
</body>
</html>
