<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سودوكو - العقل الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body {
            background: linear-gradient(135deg, #0b1120, #030712);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            background: #111827;
            border-radius: 48px;
            padding: 30px;
            text-align: center;
        }
        h1 { color: #fbbf24; margin-bottom: 20px; }
        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            background: #1e293b;
            border: 2px solid #fbbf24;
            margin: 20px auto;
            width: 450px;
        }
        .cell {
            aspect-ratio: 1;
            border: 0.5px solid #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .cell.fixed { color: #fbbf24; }
        .cell.selected { background: #4f46e5; }
        .number-buttons { display: flex; gap: 10px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
        .num-btn { background: #1e293b; width: 50px; height: 50px; border-radius: 25px; color: white; font-size: 24px; cursor: pointer; border: none; }
        .num-btn:hover { background: #10b981; }
        .score { font-size: 18px; color: #10b981; margin: 10px 0; }
        .btn { background: #6366f1; border: none; padding: 10px 25px; border-radius: 40px; color: white; cursor: pointer; margin-top: 10px; }
        @media (max-width: 550px) { .sudoku-grid { width: 320px; } .cell { font-size: 14px; } .num-btn { width: 40px; height: 40px; font-size: 18px; } }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🗓️ سودوكو جونيور</h1>
    <div class="score">⭐ النقاط: <span id="score">0</span></div>
    <div class="sudoku-grid" id="sudokuGrid"></div>
    <div class="number-buttons" id="numberButtons"></div>
    <button class="btn" onclick="checkWin()">✅ تحقق من الحل</button>
    <div class="message" id="message"></div>
</div>

<script>
    let board = [];
    let solution = [];
    let selectedCell = null;
    let score = 0;
    
    function generateSudoku() {
        let baseBoard = [
            [5,3,0,0,7,0,0,0,0],
            [6,0,0,1,9,5,0,0,0],
            [0,9,8,0,0,0,0,6,0],
            [8,0,0,0,6,0,0,0,3],
            [4,0,0,8,0,3,0,0,1],
            [7,0,0,0,2,0,0,0,6],
            [0,6,0,0,0,0,2,8,0],
            [0,0,0,4,1,9,0,0,5],
            [0,0,0,0,8,0,0,7,9]
        ];
        
        let solBoard = [
            [5,3,4,6,7,8,9,1,2],
            [6,7,2,1,9,5,3,4,8],
            [1,9,8,3,4,2,5,6,7],
            [8,5,9,7,6,1,4,2,3],
            [4,2,6,8,5,3,7,9,1],
            [7,1,3,9,2,4,8,5,6],
            [9,6,1,5,3,7,2,8,4],
            [2,8,7,4,1,9,6,3,5],
            [3,4,5,2,8,6,1,7,9]
        ];
        
        board = baseBoard;
        solution = solBoard;
        renderGrid();
    }
    
    function renderGrid() {
        const grid = document.getElementById('sudokuGrid');
        grid.innerHTML = '';
        for(let i=0; i<9; i++) {
            for(let j=0; j<9; j++) {
                const cell = document.createElement('div');
                cell.className = `cell ${board[i][j] !== 0 ? 'fixed' : ''}`;
                if(selectedCell && selectedCell.row === i && selectedCell.col === j) cell.classList.add('selected');
                cell.innerText = board[i][j] !== 0 ? board[i][j] : '';
                cell.onclick = () => selectCell(i, j);
                grid.appendChild(cell);
            }
        }
        
        const numbersDiv = document.getElementById('numberButtons');
        numbersDiv.innerHTML = '';
        for(let i=1; i<=9; i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            btn.className = 'num-btn';
            btn.onclick = () => setNumber(i);
            numbersDiv.appendChild(btn);
        }
    }
    
    function selectCell(row, col) {
        if(board[row][col] === 0) {
            selectedCell = { row, col };
            renderGrid();
        }
    }
    
    function setNumber(num) {
        if(selectedCell) {
            board[selectedCell.row][selectedCell.col] = num;
            renderGrid();
        }
    }
    
    function checkWin() {
        let correct = true;
        for(let i=0; i<9; i++) {
            for(let j=0; j<9; j++) {
                if(board[i][j] !== solution[i][j]) correct = false;
            }
        }
        
        if(correct) {
            score = 30;
            document.getElementById('score').innerText = score;
            document.getElementById('message').innerHTML = '🎉 مبروك! أكملت السودوكو!';
            fetch('/api/academic/complete-course', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ points: 30, course_name: 'سودوكو' })
            });
            setTimeout(() => { window.location.href = '/smart-games'; }, 2000);
        } else {
            document.getElementById('message').innerHTML = '❌ الحل غير صحيح! حاول مرة أخرى.';
            setTimeout(() => document.getElementById('message').innerHTML = '', 2000);
        }
    }
    
    generateSudoku();
</script>
</body>
</html>
