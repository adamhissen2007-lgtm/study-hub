<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجميع الطلاب الذكي - Study Hub AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 20px; min-height: 100vh; }
        .container { max-width: 1300px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.05); border-radius: 32px; padding: 20px 30px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { color: white; display: flex; align-items: center; gap: 10px; }
        .header a { background: rgba(255,255,255,0.1); padding: 10px 24px; border-radius: 40px; color: white; text-decoration: none; }
        .cluster-card { background: rgba(255,255,255,0.05); border-radius: 28px; padding: 20px; margin-bottom: 25px; }
        .cluster-title { font-size: 22px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .student-item { background: #1e293b; border-radius: 16px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .badge-points { background: #4f46e5; padding: 4px 12px; border-radius: 30px; font-size: 12px; color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1e293b; border-radius: 24px; padding: 20px; text-align: center; }
        .stat-value { font-size: 36px; font-weight: 900; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        @media (max-width: 700px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-chart-line" style="color: #fbbf24;"></i> تجميع الطلاب بالذكاء الاصطناعي</h1>
        <a href="/dashboard"><i class="fas fa-arrow-right"></i> العودة</a>
    </div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value" id="totalStudents">0</div><div class="stat-label">إجمالي الطلاب</div></div>
        <div class="stat-card"><div class="stat-value" id="avgPoints">0</div><div class="stat-label">متوسط النقاط</div></div>
        <div class="stat-card"><div class="stat-value" id="topStudent">-</div><div class="stat-label">أعلى طالب</div></div>
    </div>

    <div id="clustersContainer"></div>
</div>

<script>
    async function loadClusters() {
        try {
            const res = await fetch('/api/ai-clusters');
            const students = await res.json();
            
            // إحصائيات
            const total = students.length;
            const avg = students.reduce((sum, s) => sum + s.points, 0) / total;
            const top = students.reduce((max, s) => s.points > max.points ? s : max, students[0]);
            
            document.getElementById('totalStudents').innerText = total;
            document.getElementById('avgPoints').innerText = Math.round(avg);
            document.getElementById('topStudent').innerHTML = `${top.name}<br><span style="font-size:14px;">${top.points} نقطة</span>`;
            
            // تجميع حسب المجموعات
            const clusters = {};
            students.forEach(s => {
                if(!clusters[s.cluster]) clusters[s.cluster] = [];
                clusters[s.cluster].push(s);
            });
            
            const colors = {
                '🚀 المتفوقون': '#10b981',
                '📚 المجتهدون': '#fbbf24',
                '🌱 المبتدئون': '#f59e0b'
            };
            
            const container = document.getElementById('clustersContainer');
            container.innerHTML = '';
            
            for(const [clusterName, clusterStudents] of Object.entries(clusters)) {
                const card = document.createElement('div');
                card.className = 'cluster-card';
                card.innerHTML = `
                    <div class="cluster-title">
                        <i class="fas fa-users" style="color: ${colors[clusterName] || '#fff'}"></i>
                        <span style="color: ${colors[clusterName] || '#fff'}">${clusterName}</span>
                        <span style="background:#334155; padding:2px 10px; border-radius:30px; font-size:12px;">${clusterStudents.length} طالب</span>
                    </div>
                    <div>
                        ${clusterStudents.map(s => `
                            <div class="student-item">
                                <div><i class="fas fa-user-graduate"></i> <strong>${escapeHtml(s.name)}</strong></div>
                                <div><span class="badge-points">⭐ ${s.points} نقطة</span> <span class="badge-points" style="background:#f59e0b;">🎯 المستوى ${s.level}</span></div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);
            }
        } catch(e) {
            console.log(e);
            document.getElementById('clustersContainer').innerHTML = '<p style="color:#ef4444;">حدث خطأ في تحميل البيانات</p>';
        }
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    loadClusters();
</script>
</body>
</html>
