<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>غرف الفيديو الجماعية - Study Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #0f172a; min-height: 100vh; padding: 20px; }
        .video-container { max-width: 1400px; margin: 0 auto; }
        .video-header { background: rgba(255,255,255,0.05); border-radius: 25px; padding: 15px 25px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .video-header h1 { color: white; font-size: 24px; display: flex; align-items: center; gap: 10px; }
        .video-header a { background: rgba(255,255,255,0.1); color: white; padding: 8px 18px; border-radius: 30px; text-decoration: none; transition: 0.3s; }
        .video-header a:hover { background: #4f46e5; }
        .room-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; justify-content: space-between; }
        .room-id-box { background: #1e293b; padding: 8px 16px; border-radius: 50px; color: #a78bfa; font-family: monospace; font-size: 14px; border: 1px solid #4f46e5; }
        .control-btn { background: #334155; border: none; padding: 10px 20px; border-radius: 50px; color: white; font-weight: 700; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .control-btn.danger { background: #ef4444; }
        .control-btn.success { background: #10b981; }
        .control-btn:hover { transform: scale(1.02); opacity: 0.9; }
        .videos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .video-card { background: #1e293b; border-radius: 20px; overflow: hidden; aspect-ratio: 16/9; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .video-card video { width: 100%; height: 100%; object-fit: cover; background: #0f172a; }
        .video-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 20px; color: white; font-size: 11px; backdrop-filter: blur(5px); }
        .local-video-controls { background: rgba(255,255,255,0.05); border-radius: 25px; padding: 15px 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .share-link { background: #1e293b; border-radius: 16px; padding: 12px 20px; text-align: center; margin-top: 20px; }
        .share-link input { background: #0f172a; border: 1px solid #4f46e5; padding: 10px 15px; border-radius: 50px; width: 60%; color: #a78bfa; text-align: center; font-family: monospace; }
        .loading-state { text-align: center; padding: 40px; color: #fbbf24; font-size: 18px; }
        @media (max-width: 700px) { .videos-grid { grid-template-columns: 1fr; } .share-link input { width: 100%; margin-bottom: 10px; } }
    </style>
</head>
<body>
<div class="video-container">
    <div class="video-header">
        <h1><i class="fas fa-video"></i> غرف الفيديو الجماعية</h1>
        <a href="/dashboard"><i class="fas fa-arrow-right"></i> العودة للوحة</a>
    </div>
    <div class="room-actions">
        <div><span class="room-id-box" id="room-id-display">جاري التحميل...</span></div>
        <div><button class="control-btn" id="copy-room-btn" onclick="copyRoomLink()"><i class="fas fa-copy"></i> نسخ رابط الغرفة</button></div>
    </div>
    <div id="videos-grid" class="videos-grid">
        <div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> جاري تشغيل الكاميرا والميكروفون...</div>
    </div>
    <div class="local-video-controls">
        <button class="control-btn" id="toggle-audio"><i class="fas fa-microphone"></i> كتم الصوت</button>
        <button class="control-btn" id="toggle-video"><i class="fas fa-video"></i> إيقاف الكاميرا</button>
        <button class="control-btn danger" id="leave-call"><i class="fas fa-phone-slash"></i> مغادرة الغرفة</button>
    </div>
    <div class="share-link">
        <p style="color:#94a3b8; margin-bottom: 10px;"><i class="fas fa-share-alt"></i> شارك هذا الرابط مع زملائك للانضمام للمكالمة:</p>
        <input type="text" id="room-link-input" readonly value="">
        <button onclick="copyRoomLink()" style="background:#4f46e5; border:none; padding:8px 20px; border-radius:50px; color:white; margin-right:10px; cursor:pointer;">نسخ</button>
    </div>
</div>
<script>
    const socket = io();
    let localStream = null;
    let peerConnections = {};
    let currentRoom = null;
    const username = '{{ session.get("user_name", "طالب") }}';
    let localVideoElement = null;
    
    const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    
    async function initLocalStream() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const videosGrid = document.getElementById('videos-grid');
            videosGrid.innerHTML = '';
            const localVideoDiv = document.createElement('div');
            localVideoDiv.className = 'video-card';
            localVideoDiv.id = 'local-video-container';
            localVideoDiv.innerHTML = `<video id="local-video" autoplay muted playsinline></video><div class="video-label">أنت (${escapeHtml(username)})</div>`;
            videosGrid.appendChild(localVideoDiv);
            localVideoElement = document.getElementById('local-video');
            localVideoElement.srcObject = localStream;
            return true;
        } catch (err) {
            console.error('Error accessing media devices:', err);
            document.getElementById('videos-grid').innerHTML = '<div class="loading-state" style="color:#ef4444;"><i class="fas fa-exclamation-triangle"></i> لا يمكن الوصول إلى الكاميرا والميكروفون. تأكد من الأذونات.</div>';
            return false;
        }
    }
    
    async function joinRoom() {
        currentRoom = 'studyhub_main_room';
        document.getElementById('room-id-display').innerText = currentRoom;
        const fullUrl = `${window.location.origin}/video-chat`;
        document.getElementById('room-link-input').value = fullUrl;
        
        if (!await initLocalStream()) return;
        
        socket.emit('join_video_room', { room: currentRoom, username: username });
        
        socket.on('user_joined_video', async (data) => {
            if (data.userId !== socket.id && !peerConnections[data.userId]) {
                await createPeerConnection(data.userId);
            }
        });
        
        socket.on('video_offer', async (data) => {
            if (data.userId !== socket.id) {
                await handleOffer(data);
            }
        });
        
        socket.on('video_answer', async (data) => {
            if (data.userId !== socket.id && peerConnections[data.userId]) {
                await peerConnections[data.userId].setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });
        
        socket.on('video_ice_candidate', async (data) => {
            if (data.userId !== socket.id && peerConnections[data.userId]) {
                try {
                    await peerConnections[data.userId].addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch(e) { console.log('ICE candidate error:', e); }
            }
        });
        
        socket.on('user_left_video', (data) => {
            removePeerConnection(data.userId);
        });
    }
    
    async function createPeerConnection(targetUserId) {
        if (peerConnections[targetUserId]) return;
        const pc = new RTCPeerConnection(configuration);
        peerConnections[targetUserId] = pc;
        
        if (localStream) {
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }
        
        pc.ontrack = (event) => {
            addRemoteVideoTrack(event.streams[0], targetUserId);
        };
        
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                socket.emit('video_ice_candidate', { target: targetUserId, candidate: event.candidate, room: currentRoom });
            }
        };
        
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('video_offer', { target: targetUserId, offer: pc.localDescription, room: currentRoom });
    }
    
    async function handleOffer(data) {
        const pc = new RTCPeerConnection(configuration);
        peerConnections[data.userId] = pc;
        
        if (localStream) {
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }
        
        pc.ontrack = (event) => {
            addRemoteVideoTrack(event.streams[0], data.userId);
        };
        
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                socket.emit('video_ice_candidate', { target: data.userId, candidate: event.candidate, room: currentRoom });
            }
        };
        
        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit('video_answer', { target: data.userId, answer: pc.localDescription, room: currentRoom });
    }
    
    function addRemoteVideoTrack(stream, userId) {
        const videosGrid = document.getElementById('videos-grid');
        let existingCard = document.getElementById(`remote-video-${userId}`);
        if (existingCard) return;
        
        const remoteVideoDiv = document.createElement('div');
        remoteVideoDiv.className = 'video-card';
        remoteVideoDiv.id = `remote-video-${userId}`;
        remoteVideoDiv.innerHTML = `<video id="video-${userId}" autoplay playsinline></video><div class="video-label">زميل في الغرفة</div>`;
        videosGrid.appendChild(remoteVideoDiv);
        const videoElement = document.getElementById(`video-${userId}`);
        videoElement.srcObject = stream;
    }
    
    function removePeerConnection(userId) {
        if (peerConnections[userId]) {
            peerConnections[userId].close();
            delete peerConnections[userId];
        }
        const videoCard = document.getElementById(`remote-video-${userId}`);
        if (videoCard) videoCard.remove();
    }
    
    function copyRoomLink() {
        const input = document.getElementById('room-link-input');
        input.select();
        document.execCommand('copy');
        alert('✅ تم نسخ رابط الغرفة!');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    joinRoom();
    
    document.getElementById('toggle-audio').onclick = () => {
        if (localStream) {
            const audioTrack = localStream.getAudioTracks()[0];
            audioTrack.enabled = !audioTrack.enabled;
            document.getElementById('toggle-audio').innerHTML = audioTrack.enabled ? '<i class="fas fa-microphone"></i> كتم الصوت' : '<i class="fas fa-microphone-slash"></i> إلغاء الكتم';
        }
    };
    
    document.getElementById('toggle-video').onclick = () => {
        if (localStream) {
            const videoTrack = localStream.getVideoTracks()[0];
            videoTrack.enabled = !videoTrack.enabled;
            document.getElementById('toggle-video').innerHTML = videoTrack.enabled ? '<i class="fas fa-video"></i> إيقاف الكاميرا' : '<i class="fas fa-video-slash"></i> تشغيل الكاميرا';
        }
    };
    
    document.getElementById('leave-call').onclick = () => {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
        window.location.href = '/dashboard';
    };
    
    window.addEventListener('beforeunload', () => {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
    });
</script>
</body>
</html>
