<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلبات المذاكرة - Study Hub AI</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        .header { background: rgba(17,24,39,0.95); backdrop-filter: blur(10px); border-radius: 30px; padding: 20px 30px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .header h1 { color: #fbbf24; display: flex; align-items: center; gap: 10px; }
        .back-btn { background: #4f46e5; color: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: #7c3aed; transform: translateY(-2px); }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #111827; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #1f2937; }
        .stat-number { font-size: 32px; font-weight: bold; color: #fbbf24; }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { background: #1e293b; border: none; padding: 10px 25px; border-radius: 40px; color: white; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #4f46e5; }
        
        /* Match Cards */
        .match-card { background: #111827; border-radius: 25px; padding: 25px; margin-bottom: 20px; border: 1px solid #1f2937; transition: 0.3s; animation: fadeIn 0.4s ease; }
        .match-card:hover { transform: translateY(-3px); border-color: #8b5cf6; }
        .match-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 15px; }
        .match-user { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 50px; height: 50px; background: linear-gradient(135deg, #4f46e5, #7c3aed); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .compatibility-badge { background: #10b981; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; display: inline-flex; align-items: center; gap: 5px; }
        .compatibility-low { background: #ef4444; }
        .compatibility-medium { background: #f59e0b; }
        .match-details { margin: 15px 0; padding: 15px; background: #1e293b; border-radius: 20px; }
        .match-actions { display: flex; gap: 15px; margin-top: 15px; }
        .btn-accept { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; transition: 0.3s; }
        .btn-reject { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; transition: 0.3s; }
        .btn-pending { background: #f59e0b; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: not-allowed; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 700px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .match-header { flex-direction: column; align-items: flex-start; gap: 10px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-handshake"></i> 🤝 طلبات المذاكرة</h1>
        <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-right"></i> العودة</a>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div class="stat-label">⏳ في الانتظار</div></div>
        <div class="stat-card"><div class="stat-number" id="activeCount">0</div><div class="stat-label">🟢 نشطة</div></div>
        <div class="stat-card"><div class="stat-number" id="completedCount">0</div><div class="stat-label">✅ مكتملة</div></div>
        <div class="stat-card"><div class="stat-number" id="trustScore">0</div><div class="stat-label">⭐ درجة الثقة</div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="incoming">📥 طلبات واردة</button>
        <button class="tab-btn" data-tab="outgoing">📤 طلبات مرسلة</button>
        <button class="tab-btn" data-tab="active">🟢 جلسات نشطة</button>
        <button class="tab-btn" data-tab="completed">✅ مكتملة</button>
    </div>

    <div id="matchesList"></div>
</div>

<script>
    let csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
    let currentTab = 'incoming';

    async function loadMatches() {
        try {
            const response = await fetch('/api/study/matches?tab=' + currentTab);
            const data = await response.json();
            document.getElementById('pendingCount').innerText = data.stats?.pending || 0;
            document.getElementById('activeCount').innerText = data.stats?.active || 0;
            document.getElementById('completedCount').innerText = data.stats?.completed || 0;
            document.getElementById('trustScore').innerText = data.stats?.trust_score || 0;
            renderMatches(data.matches || []);
        } catch(e) { console.error(e); }
    }

    function renderMatches(matches) {
        const container = document.getElementById('matchesList');
        if (!matches.length) {
            container.innerHTML = '<div style="text-align: center; padding: 60px; background: #111827; border-radius: 30px;"><i class="fas fa-inbox" style="font-size: 48px; color: #4f46e5;"></i><p style="margin-top: 15px;">لا توجد طلبات حالياً</p></div>';
            return;
        }

        container.innerHTML = matches.map(m => `
            <div class="match-card" data-id="${m.id}">
                <div class="match-header">
                    <div class="match-user">
                        <div class="user-avatar"><i class="fas fa-user-graduate"></i></div>
                        <div>
                            <div style="font-weight: bold; font-size: 18px;">${m.user_name}</div>
                            <div style="font-size: 12px; color: #9ca3af;">${m.major} • ${m.university_year}</div>
                        </div>
                    </div>
                    <div class="compatibility-badge ${getCompatibilityClass(m.compatibility)}">
                        <i class="fas fa-chart-line"></i> توافق ${m.compatibility}%
                    </div>
                </div>
                <div class="match-details">
                    <div><i class="fas fa-book"></i> الموضوع: <strong>${m.topic}</strong></div>
                    <div style="margin-top: 8px;"><i class="fas fa-clock"></i> المدة: ${m.duration} دقيقة</div>
                    <div style="margin-top: 8px;"><i class="fas fa-calendar"></i> المرسل: ${m.created_at}</div>
                </div>
                <div class="match-actions">
                    ${m.status === 'pending' ? `
                        <button class="btn-accept" onclick="respondToMatch(${m.id}, true)"><i class="fas fa-check"></i> قبول</button>
                        <button class="btn-reject" onclick="respondToMatch(${m.id}, false)"><i class="fas fa-times"></i> رفض</button>
                    ` : m.status === 'accepted' ? `
                        <button class="btn-pending" disabled><i class="fas fa-spinner fa-spin"></i> قيد الانتظار</button>
                        <button class="btn-accept" onclick="startSession(${m.id})"><i class="fas fa-video"></i> بدء الجلسة</button>
                    ` : m.status === 'active' ? `
                        <button class="btn-accept" onclick="joinSession('${m.room_name}')"><i class="fas fa-door-open"></i> دخول الغرفة</button>
                    ` : m.status === 'completed' ? `
                        <span style="color: #10b981;"><i class="fas fa-check-circle"></i> مكتملة</span>
                    ` : ''}
                </div>
            </div>
        `).join('');
    }

    function getCompatibilityClass(score) {
        if (score >= 70) return '';
        if (score >= 40) return 'compatibility-medium';
        return 'compatibility-low';
    }

    async function respondToMatch(matchId, accept) {
        try {
            const response = await fetch(`/api/study/match/respond/${matchId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                body: JSON.stringify({ accept: accept })
            });
            const data = await response.json();
            if (data.success) {
                if (data.room_name) {
                    window.location.href = `/study-room/${data.room_name}`;
                } else {
                    alert(accept ? '✅ تم قبول الطلب!' : '❌ تم رفض الطلب');
                    loadMatches();
                }
            }
        } catch(e) { alert('حدث خطأ'); }
    }

    async function startSession(matchId) {
        window.location.href = `/study-session/start/${matchId}`;
    }

    function joinSession(roomName) {
        window.location.href = `/study-room/${roomName}`;
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            loadMatches();
        });
    });

    loadMatches();
    setInterval(loadMatches, 30000);
</script>
</body>
</html>
