<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العقل الثاني - Study Hub AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 20px; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border-radius: 32px; padding: 20px 30px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; border: 1px solid rgba(99,102,241,0.3); }
        .header h1 { color: white; display: flex; align-items: center; gap: 10px; }
        .header a { background: rgba(255,255,255,0.1); padding: 10px 24px; border-radius: 40px; color: white; text-decoration: none; }
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .note-card { background: #1e293b; border-radius: 24px; padding: 20px; transition: 0.3s; border: 1px solid #334155; cursor: pointer; }
        .note-card:hover { transform: translateY(-5px); border-color: #4f46e5; }
        .note-card.important { border-right: 4px solid #fbbf24; }
        .note-title { color: #fbbf24; font-size: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .note-content { color: #94a3b8; font-size: 14px; margin-bottom: 12px; line-height: 1.5; }
        .note-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .tag { background: #334155; padding: 4px 10px; border-radius: 30px; font-size: 11px; color: #cbd5e1; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: linear-gradient(135deg, #4f46e5, #7c3aed); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; cursor: pointer; box-shadow: 0 10px 25px rgba(79,70,229,0.4); transition: 0.3s; z-index: 100; }
        .fab:hover { transform: scale(1.05); }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; border-radius: 32px; padding: 30px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-content input, .modal-content textarea, .modal-content select { width: 100%; padding: 12px; border-radius: 20px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; }
        .modal-content textarea { min-height: 150px; }
        .tag-input { display: flex; gap: 8px; margin-bottom: 15px; }
        .tag-input input { flex: 1; margin-bottom: 0; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
        .search-bar { margin-bottom: 30px; display: flex; gap: 12px; flex-wrap: wrap; }
        .search-bar input { flex: 1; padding: 12px 20px; border-radius: 40px; border: 1px solid #334155; background: #0f172a; color: white; }
        .reminder-badge { background: #10b981; color: white; font-size: 10px; padding: 2px 8px; border-radius: 30px; display: inline-block; margin-top: 8px; }
        @media (max-width: 700px) { .notes-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-brain"></i> العقل الثاني - Second Brain</h1>
        <a href="/dashboard"><i class="fas fa-arrow-right"></i> العودة للوحة</a>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 بحث في الملاحظات...">
        <input type="text" id="tagSearch" placeholder="🏷️ بحث بالوسم...">
        <button onclick="searchNotes()" style="background:#4f46e5; border:none; padding:12px 24px; border-radius:40px; color:white;">بحث</button>
        <button onclick="resetSearch()" style="background:#334155; border:none; padding:12px 24px; border-radius:40px; color:white;">إعادة تعيين</button>
    </div>

    <div class="notes-grid" id="notesGrid"></div>
</div>

<button class="fab" onclick="openCreateModal()"><i class="fas fa-plus"></i></button>

<div id="noteModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color: #fbbf24; margin-bottom: 20px;">ملاحظة جديدة</h3>
        <input type="text" id="noteTitle" placeholder="عنوان الملاحظة">
        <textarea id="noteContent" placeholder="محتوى الملاحظة..."></textarea>
        <select id="noteCourse">
            <option value="">بدون مادة</option>
            {% for course in courses %}
            <option value="{{ course.id }}">{{ course.name }}</option>
            {% endfor %}
        </select>
        <div class="tag-input">
            <input type="text" id="tagInput" placeholder="أضف وسم (مثال: مهم، مراجعة، فكرة)">
            <button onclick="addTag()" style="background:#4f46e5; border:none; padding:12px 24px; border-radius:30px; color:white;">إضافة</button>
        </div>
        <div id="tagsList" class="tag-list"></div>
        <div style="display: flex; gap: 12px; margin-top: 15px;">
            <input type="datetime-local" id="reminderDate" style="flex:1;">
            <label style="display: flex; align-items: center; gap: 8px;"><input type="checkbox" id="isImportant"> مهمة</label>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button onclick="saveNote()" style="background:#10b981; border:none; padding:12px 24px; border-radius:30px; color:white;">حفظ</button>
            <button onclick="closeModal()" style="background:#ef4444; border:none; padding:12px 24px; border-radius:30px; color:white;">إلغاء</button>
        </div>
    </div>
</div>

<script>
    let currentNoteId = null;
    let tags = [];

    async function loadNotes() {
        const res = await fetch('/api/note/search');
        const notes = await res.json();
        const container = document.getElementById('notesGrid');
        container.innerHTML = notes.map(n => `
            <div class="note-card ${n.is_important ? 'important' : ''}" onclick="viewNote(${n.id})">
                <div class="note-title">
                    <span>${escapeHtml(n.title)}</span>
                    ${n.is_important ? '<i class="fas fa-star" style="color:#fbbf24;"></i>' : ''}
                </div>
                <div class="note-content">${escapeHtml(n.content)}</div>
                <div class="note-tags">${n.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
                <div class="reminder-badge" style="${n.reminder ? '' : 'display:none'}">⏰ تذكير: ${n.reminder}</div>
            </div>
        `).join('');
    }

    async function searchNotes() {
        const query = document.getElementById('searchInput').value;
        const tag = document.getElementById('tagSearch').value;
        const res = await fetch(`/api/note/search?q=${encodeURIComponent(query)}&tag=${encodeURIComponent(tag)}`);
        const notes = await res.json();
        const container = document.getElementById('notesGrid');
        container.innerHTML = notes.map(n => `
            <div class="note-card ${n.is_important ? 'important' : ''}" onclick="viewNote(${n.id})">
                <div class="note-title">${escapeHtml(n.title)}</div>
                <div class="note-content">${escapeHtml(n.content)}</div>
                <div class="note-tags">${n.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
            </div>
        `).join('');
    }

    function resetSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('tagSearch').value = '';
        loadNotes();
    }

    function openCreateModal() {
        currentNoteId = null;
        tags = [];
        document.getElementById('noteTitle').value = '';
        document.getElementById('noteContent').value = '';
        document.getElementById('noteCourse').value = '';
        document.getElementById('reminderDate').value = '';
        document.getElementById('isImportant').checked = false;
        renderTags();
        document.getElementById('modalTitle').innerText = 'ملاحظة جديدة';
        document.getElementById('noteModal').style.display = 'flex';
    }

    async function viewNote(id) {
        const res = await fetch(`/api/note/${id}`);
        const note = await res.json();
        currentNoteId = note.id;
        document.getElementById('noteTitle').value = note.title;
        document.getElementById('noteContent').value = note.content;
        document.getElementById('noteCourse').value = note.course_id || '';
        tags = note.tags;
        renderTags();
        if(note.reminder_date) document.getElementById('reminderDate').value = note.reminder_date.slice(0, 16);
        document.getElementById('isImportant').checked = note.is_important;
        document.getElementById('modalTitle').innerText = 'تعديل الملاحظة';
        document.getElementById('noteModal').style.display = 'flex';
    }

    function addTag() {
        const input = document.getElementById('tagInput');
        const tag = input.value.trim();
        if(tag && !tags.includes(tag)) {
            tags.push(tag);
            renderTags();
        }
        input.value = '';
    }

    function renderTags() {
        const container = document.getElementById('tagsList');
        container.innerHTML = tags.map(t => `<span class="tag" style="background:#4f46e5; cursor:pointer;" onclick="removeTag('${t}')">${escapeHtml(t)} <i class="fas fa-times" style="margin-right:6px;"></i></span>`).join('');
    }

    function removeTag(tag) {
        tags = tags.filter(t => t !== tag);
        renderTags();
    }

    async function saveNote() {
        const data = {
            title: document.getElementById('noteTitle').value,
            content: document.getElementById('noteContent').value,
            course_id: document.getElementById('noteCourse').value || null,
            tags: tags,
            is_important: document.getElementById('isImportant').checked,
            reminder_date: document.getElementById('reminderDate').value || null,
            linked_notes: []
        };
        
        const url = currentNoteId ? `/api/note/${currentNoteId}` : '/api/note/create';
        const method = currentNoteId ? 'PUT' : 'POST';
        
        const res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        if(res.ok) {
            closeModal();
            loadNotes();
        } else alert('حدث خطأ');
    }

    function closeModal() {
        document.getElementById('noteModal').style.display = 'none';
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    loadNotes();
</script>
</body>
</html>
