<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وضع التركيز الخارق - Study Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* إعادة تعيين كاملة لضمان عدم وجود أي مشتتات */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            color: #e2e8f0;
            transition: background 0.5s;
        }
        
        /* تأثيرات الخلفية النجمية */
        .stars {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, rgba(99,102,241,0.1) 0%, transparent 70%);
            z-index: 0;
        }

        /* الحاوية الرئيسية للعداد */
        .focus-container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* الحلقات النابضة حول المؤقت */
        .timer-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid rgba(99, 102, 241, 0.2);
            animation: pulse-ring 3s infinite ease-in-out;
        }
        .ring-1 { width: 270px; height: 270px; }
        .ring-2 { width: 320px; height: 320px; animation-delay: 1s; border-color: rgba(139, 92, 246, 0.1); }
        .ring-3 { width: 370px; height: 370px; animation-delay: 2s; border-color: rgba(168, 85, 247, 0.05); }
        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0; }
        }

        /* المؤقت نفسه */
        .timer-display {
            font-size: 100px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px rgba(99, 102, 241, 0.6);
            letter-spacing: 8px;
            transition: color 0.3s;
            position: relative;
            z-index: 20;
        }

        /* أزرار التحكم */
        .controls {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 25px;
            position: relative;
            z-index: 20;
        }
        .ctrl-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .ctrl-btn:hover { background: rgba(99,102,241,0.3); border-color: #6366f1; transform: translateY(-3px); }
        .ctrl-btn.start { background: #6366f1; border-color: #6366f1; }
        .ctrl-btn.start:hover { background: #4f46e5; }

        /* إعدادات المدة */
        .duration-settings {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
            position: relative;
            z-index: 20;
        }
        .duration-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: #94a3b8;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .duration-btn.active { background: #6366f1; border-color: #6366f1; color: white; }

        /* عداد الجلسات */
        .session-counter {
            margin-top: 30px;
            color: #94a3b8;
            font-size: 14px;
            position: relative;
            z-index: 20;
        }

        /* رسائل التحفيز */
        .motivation-msg {
            margin-top: 25px;
            color: #fbbf24;
            font-size: 18px;
            font-weight: 700;
            min-height: 30px;
            transition: opacity 0.5s;
            position: relative;
            z-index: 20;
        }

        /* زر الخروج والعودة */
        .exit-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 100;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }
        .exit-btn:hover { background: rgba(239,68,68,0.2); color: white; }
    </style>
</head>
<body>
    <div class="stars"></div>
    <a href="/dashboard" class="exit-btn">← إنهاء التركيز</a>

    <div class="focus-container">
        <div class="timer-ring ring-1"></div>
        <div class="timer-ring ring-2"></div>
        <div class="timer-ring ring-3"></div>
        
        <div class="timer-display" id="timerDisplay">25:00</div>
        
        <div class="controls">
            <button class="ctrl-btn start" id="startBtn" onclick="startTimer()">▶ ابدأ</button>
            <button class="ctrl-btn" onclick="resetTimer()">↺ تصفير</button>
            <button class="ctrl-btn" onclick="toggleFullscreen()">⛶ ملء الشاشة</button>
        </div>

        <div class="duration-settings">
            <button class="duration-btn active" onclick="setDuration(25)">25 دقيقة</button>
            <button class="duration-btn" onclick="setDuration(45)">45 دقيقة</button>
            <button class="duration-btn" onclick="setDuration(60)">60 دقيقة</button>
        </div>

        <div class="session-counter">
            🏆 الجلسات المكتملة اليوم: <strong id="sessionCount">0</strong>
        </div>
        
        <div class="motivation-msg" id="motivationMsg"></div>
    </div>

    <script>
        let timerInterval;
        let totalSeconds = 25 * 60;
        let initialSeconds = 25 * 60;
        let isRunning = false;
        let completedSessions = parseInt(localStorage.getItem('focusSessions_' + new Date().toDateString()) || '0');

        // تحديث العداد
        function updateDisplay() {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            document.getElementById('timerDisplay').textContent = 
                String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
            document.getElementById('sessionCount').textContent = completedSessions;
        }

        // بدء المؤقت
        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('startBtn').textContent = '⏸ إيقاف';
            document.getElementById('startBtn').classList.remove('start');
            document.getElementById('motivationMsg').textContent = '';
            
            timerInterval = setInterval(() => {
                if (totalSeconds > 0) {
                    totalSeconds--;
                    updateDisplay();
                } else {
                    clearInterval(timerInterval);
                    isRunning = false;
                    completedSessions++;
                    localStorage.setItem('focusSessions_' + new Date().toDateString(), completedSessions);
                    updateDisplay();
                    document.getElementById('startBtn').textContent = '▶ ابدأ';
                    document.getElementById('startBtn').classList.add('start');
                    
                    // رسالة تحفيزية عشوائية
                    const msgs = [
                        '🎉 إنجاز رائع! خذ 5 دقائق راحة.', '💪 أنت بطل! استمر في التقدم.', 
                        '🧠 العقل القوي يحتاج لجلسات عميقة.', '🌟 تركيز اليوم هو نجاح الغد.'
                    ];
                    document.getElementById('motivationMsg').textContent = msgs[Math.floor(Math.random() * msgs.length)];
                }
            }, 1000);
        }

        // إعادة تعيين
        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            totalSeconds = initialSeconds;
            updateDisplay();
            document.getElementById('startBtn').textContent = '▶ ابدأ';
            document.getElementById('startBtn').classList.add('start');
            document.getElementById('motivationMsg').textContent = '';
        }

        // تغيير المدة
        function setDuration(minutes) {
            document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            initialSeconds = minutes * 60;
            resetTimer();
        }

        // ملء الشاشة
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        // التهيئة
        updateDisplay();
    </script>
</body>
</html>
