<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المفاهيم - Study Hub AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #0b1120, #030712); padding: 40px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: rgba(17,24,39,0.9); border-radius: 30px; padding: 20px 30px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .header h1 { color: #8b5cf6; display: flex; align-items: center; gap: 10px; }
        .back-btn { background: #4f46e5; color: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: #7c3aed; transform: translateY(-2px); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #111827; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #1f2937; }
        .stat-number { font-size: 32px; font-weight: bold; color: #8b5cf6; }
        .action-buttons { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; justify-content: center; }
        .action-btn { background: #1e293b; border: none; padding: 12px 25px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .action-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .action-btn.primary { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .action-btn.danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .result-card { background: #111827; border-radius: 20px; padding: 25px; margin-top: 20px; border: 1px solid #1f2937; }
        .result-card h3 { color: #fbbf24; margin-bottom: 15px; }
        .gap-item { background: #1e293b; border-radius: 15px; padding: 15px; margin-bottom: 10px; border-right: 3px solid #f59e0b; }
        .recommendation-item { background: #1e293b; border-radius: 15px; padding: 15px; margin-bottom: 10px; border-right: 3px solid #10b981; }
        .concept-path { background: #1e293b; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .concept-node { background: #4f46e5; color: white; padding: 8px 15px; border-radius: 30px; font-size: 14px; }
        .arrow { color: #8b5cf6; font-size: 20px; }
        .loading { text-align: center; padding: 40px; color: #9ca3af; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-project-diagram"></i> خريطة المفاهيم (Concept Graph)</h1>
        <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للوحة</a>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" id="totalConcepts">0</div>
            <div class="stat-label">إجمالي المفاهيم</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="totalEdges">0</div>
            <div class="stat-label">الروابط بين المفاهيم</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="masteryLevel">0</div>
            <div class="stat-label">مستوى الإتقان</div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="action-btn primary" onclick="loadConceptStats()"><i class="fas fa-chart-simple"></i> إحصائيات المفاهيم</button>
        <button class="action-btn" onclick="loadKnowledgeGaps()"><i class="fas fa-exclamation-triangle"></i> فجوات المعرفة</button>
        <button class="action-btn" onclick="loadConceptRecommendations()"><i class="fas fa-lightbulb"></i> توصيات ذكية</button>
        <button class="action-btn" onclick="loadLearningPath()"><i class="fas fa-road"></i> مسار التعلم</button>
    </div>

    <div class="result-card" id="resultCard">
        <h3><i class="fas fa-info-circle"></i> النتائج</h3>
        <div id="resultContent" class="loading">اضغط على أحد الأزرار أعلاه لعرض البيانات...</div>
    </div>
</div>

<script>
    async function loadConceptStats() {
        document.getElementById('resultContent').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحميل الإحصائيات...</div>';
        try {
            const response = await fetch('/api/concepts/graph');
            const stats = await response.json();
            
            document.getElementById('totalConcepts').innerText = stats.total_concepts || 0;
            document.getElementById('totalEdges').innerText = stats.total_edges || 0;
            document.getElementById('masteryLevel').innerText = stats.mastery_levels || 0;
            
            document.getElementById('resultContent').innerHTML = `
                <div style="line-height: 1.8;">
                    <p><i class="fas fa-database" style="color:#8b5cf6"></i> <strong>إجمالي المفاهيم:</strong> ${stats.total_concepts || 0}</p>
                    <p><i class="fas fa-link" style="color:#8b5cf6"></i> <strong>الروابط بين المفاهيم:</strong> ${stats.total_edges || 0}</p>
                    <p><i class="fas fa-chart-line" style="color:#8b5cf6"></i> <strong>مستويات الإتقان المسجلة:</strong> ${stats.mastery_levels || 0}</p>
                    <p><i class="fas fa-users" style="color:#8b5cf6"></i> <strong>المستخدمين النشطين:</strong> ${stats.active_users || 1}</p>
                    <hr style="border-color: #1f2937; margin: 15px 0;">
                    <p><i class="fas fa-chart-pie"></i> خريطة المفاهيم تساعدك على فهم العلاقات بين المواضيع المختلفة وتحديد أولويات التعلم.</p>
                </div>
            `;
        } catch(e) {
            document.getElementById('resultContent').innerHTML = '<div class="loading">⚠️ خطأ في تحميل الإحصائيات</div>';
        }
    }

    async function loadKnowledgeGaps() {
        document.getElementById('resultContent').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحليل فجوات المعرفة...</div>';
        try {
            const response = await fetch('/api/concepts/knowledge-gaps');
            const data = await response.json();
            
            if (data.gaps && data.gaps.length > 0) {
                document.getElementById('resultContent').innerHTML = `
                    <div style="color: #f59e0b; margin-bottom: 15px;">
                        <i class="fas fa-exclamation-triangle"></i> تم اكتشاف ${data.gaps.length} فجوة معرفية:
                    </div>
                    ${data.gaps.map(gap => `
                        <div class="gap-item">
                            <strong><i class="fas fa-puzzle-piece"></i> ${gap.concept_name || gap}</strong>
                            <div style="font-size: 13px; color: #9ca3af; margin-top: 5px;">
                                مستوى الإتقان: ${gap.mastery || 'منخفض'} | 
                                الأهمية: ${gap.priority || 'عالية'}
                            </div>
                            <div style="font-size: 13px; margin-top: 8px;">💡 ${gap.suggestion || 'راجع هذا المفهوم قبل الانتقال للمواضيع المتقدمة'}</div>
                        </div>
                    `).join('')}
                    <div style="margin-top: 15px; padding: 10px; background: #1e293b; border-radius: 12px;">
                        <i class="fas fa-lightbulb" style="color: #fbbf24;"></i> ننصحك بالتركيز على هذه المفاهيم أولاً لتحسين مستواك الدراسي.
                    </div>
                `;
            } else {
                document.getElementById('resultContent').innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <i class="fas fa-check-circle" style="color: #10b981; font-size: 48px;"></i>
                        <p style="margin-top: 15px;">🎉 ممتاز! لا توجد فجوات معرفية. أنت على الطريق الصحيح!</p>
                    </div>
                `;
            }
        } catch(e) {
            document.getElementById('resultContent').innerHTML = '<div class="loading">⚠️ خطأ في تحليل فجوات المعرفة</div>';
        }
    }

    async function loadConceptRecommendations() {
        document.getElementById('resultContent').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري إنشاء التوصيات...</div>';
        try {
            const response = await fetch('/api/concepts/recommendations');
            const data = await response.json();
            
            if (data.recommendations && data.recommendations.length > 0) {
                document.getElementById('resultContent').innerHTML = `
                    <div style="color: #10b981; margin-bottom: 15px;">
                        <i class="fas fa-lightbulb"></i> توصيات مخصصة لك (${data.recommendations.length}):
                    </div>
                    ${data.recommendations.map(rec => `
                        <div class="recommendation-item">
                            <strong><i class="fas fa-graduation-cap"></i> ${rec.concept_name || rec}</strong>
                            <div style="font-size: 13px; color: #9ca3af; margin-top: 5px;">${rec.reason || 'أضف هذا المفهوم لخطة دراستك'}</div>
                            <div style="font-size: 12px; margin-top: 8px;">⏱️ الوقت المقدر: ${rec.estimated_hours || 2} ساعات</div>
                        </div>
                    `).join('')}
                `;
            } else {
                document.getElementById('resultContent').innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <i class="fas fa-chart-line" style="color: #8b5cf6; font-size: 48px;"></i>
                        <p style="margin-top: 15px;">📚 استمر في التعلم! أنت في مستوى متقدم.</p>
                    </div>
                `;
            }
        } catch(e) {
            document.getElementById('resultContent').innerHTML = '<div class="loading">⚠️ خطأ في تحميل التوصيات</div>';
        }
    }

    async function loadLearningPath() {
        document.getElementById('resultContent').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري إنشاء مسار التعلم...</div>';
        try {
            // استخدام concept_id تجريبي
            const response = await fetch('/api/concepts/learning-path/programming');
            const data = await response.json();
            
            if (data.path && data.path.length > 0) {
                document.getElementById('resultContent').innerHTML = `
                    <div style="margin-bottom: 15px;">
                        <i class="fas fa-road" style="color: #fbbf24;"></i> مسار التعلم المقترح (${data.total_concepts} مفهوم):
                    </div>
                    <div class="concept-path">
                        ${data.path.map((concept, i) => `
                            <span class="concept-node">${i+1}. ${concept.name}</span>
                            ${i < data.path.length - 1 ? '<span class="arrow"><i class="fas fa-arrow-left"></i></span>' : ''}
                        `).join('')}
                    </div>
                    <div style="margin-top: 15px; padding: 10px; background: #1e293b; border-radius: 12px;">
                        <i class="fas fa-info-circle"></i> اتبع هذا الترتيب للحصول على أفضل تجربة تعليمية.
                    </div>
                `;
            } else {
                document.getElementById('resultContent').innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <p>✨ مسار التعلم قيد الإنشاء. تابع إنجاز المزيد من المهارات!</p>
                    </div>
                `;
            }
        } catch(e) {
            document.getElementById('resultContent').innerHTML = '<div class="loading">⚠️ خطأ في إنشاء مسار التعلم</div>';
        }
    }

    // تحميل الإحصائيات الأولية
    loadConceptStats();
    setInterval(loadConceptStats, 60000);
</script>
</body>
</html>
