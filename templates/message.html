<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            padding: 20px;
        }
        .message-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(99,102,241,0.3);
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon {
            font-size: 70px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            color: white;
            margin-bottom: 15px;
        }
        p {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 14px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
    </style>
</head>
<body>
<div class="message-card">
    <div class="icon">
        {% if 'تم تفعيل' in message or 'نجاح' in message %}
            <i class="fas fa-check-circle" style="color: #10b981;"></i>
        {% elif 'رابط' in message %}
            <i class="fas fa-envelope" style="color: #fbbf24;"></i>
        {% else %}
            <i class="fas fa-info-circle" style="color: #fbbf24;"></i>
        {% endif %}
    </div>
    <h1>{{ message }}</h1>
    <a href="/login" class="btn">تسجيل الدخول</a>
</div>
</body>
</html>
