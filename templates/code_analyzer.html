## 📁 **الملف الثالث: `templates/code_analyzer.html` (واجهة جبارة)**

```html
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محلل الكود الذكي - Study Hub AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b1120;
            --bg-card: #111827;
            --border: #1f2937;
            --accent: #6366f1;
            --gold: #fbbf24;
            --text: #f3f4f6;
            --text-dim: #9ca3af;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body {
            background: radial-gradient(circle at 10% 20%, var(--bg-dark), #030712);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid rgba(99,102,241,0.2);
        }
        .user-info h1 { font-size: 28px; color: white; display: flex; align-items: center; gap: 10px; }
        .back-btn {
            background: rgba(31, 41, 55, 0.8);
            padding: 8px 18px;
            border-radius: 40px;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
        }
        
        .grid-2cols {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
        }
        .card {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 25px;
            border: 1px solid var(--border);
        }
        .card-title {
            color: var(--gold);
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            color: white;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        
        select {
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 15px;
            color: white;
            margin-bottom: 10px;
        }
        
        .btn-primary {
            background: var(--accent);
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-primary:hover { transform: scale(0.98); filter: brightness(1.1); }
        
        .analysis-result {
            background: #0f172a;
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
        }
        .quality-score {
            font-size: 48px;
            font-weight: 900;
            text-align: center;
        }
        .issue-item {
            background: rgba(239, 68, 68, 0.2);
            border-right: 3px solid var(--danger);
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
        }
        .suggestion-item {
            background: rgba(16, 185, 129, 0.2);
            border-right: 3px solid var(--success);
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
        }
        
        .search-result {
            background: #0f172a;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
        }
        
        @media (max-width: 700px) {
            .grid-2cols { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="user-info">
            <h1><i class="fas fa-code" style="color: var(--gold);"></i> محلل الكود الذكي</h1>
            <span class="badge">AI-Powered Code Analysis</span>
        </div>
        <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-right"></i> العودة</a>
    </div>

    <div class="grid-2cols">
        <!-- إدخال الكود -->
        <div class="card">
            <div class="card-title"><i class="fas fa-edit"></i> 📝 أضف كودك هنا</div>
            <select id="languageSelect">
                <option value="python">🐍 Python</option>
                <option value="javascript">⚡ JavaScript</option>
                <option value="html">🌐 HTML</option>
                <option value="css">🎨 CSS</option>
                <option value="cpp">⚙️ C++</option>
                <option value="java">☕ Java</option>
            </select>
            <textarea id="codeInput" rows="12" placeholder="اكتب أو الصق كودك هنا..."></textarea>
            <button class="btn-primary" onclick="analyzeCode()"><i class="fas fa-chart-line"></i> تحليل الكود</button>
            <button class="btn-primary" onclick="explainCode()" style="background: var(--success);"><i class="fas fa-robot"></i> اشرح لي هذا الكود</button>
        </div>

        <!-- نتائج التحليل -->
        <div class="card">
            <div class="card-title"><i class="fas fa-chart-simple"></i> 📊 تحليل الجودة</div>
            <div id="analysisResult">
                <p style="color: var(--text-dim); text-align: center;">🔍 اضغط على "تحليل الكود" لبدء التحليل</p>
            </div>
        </div>
    </div>

    <!-- البحث الذكي -->
    <div class="card">
        <div class="card-title"><i class="fas fa-search"></i> 🔍 البحث الذكي في الكود</div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="searchQuery" placeholder="ابحث عن... مثال: 'login function', 'database connection'" style="flex: 1; background: #0f172a; border: 1px solid var(--border); border-radius: 40px; padding: 12px; color: white;">
            <button class="btn-primary" onclick="searchCode()" style="width: auto; padding: 12px 25px;"><i class="fas fa-search"></i> بحث</button>
        </div>
        <div id="searchResults" style="margin-top: 20px;">
            <p style="color: var(--text-dim); text-align: center;">✨ اكتب سؤالاً وابحث في قاعدة الأكواد</p>
        </div>
    </div>
</div>

<script>
    async function analyzeCode() {
        const code = document.getElementById('codeInput').value;
        const language = document.getElementById('languageSelect').value;
        
        if (!code.trim()) {
            alert('الرجاء إدخال كود للتحليل');
            return;
        }
        
        const resultDiv = document.getElementById('analysisResult');
        resultDiv.innerHTML = '<p style="text-align: center;"><i class="fas fa-spinner fa-pulse"></i> جاري تحليل الكود...</p>';
        
        try {
            const res = await fetch('/api/code/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code, language: language })
            });
            const data = await res.json();
            
            if (data.analysis) {
                const quality = data.analysis.quality_score;
                const color = quality >= 70 ? 'var(--success)' : quality >= 40 ? 'var(--warning)' : 'var(--danger)';
                
                resultDiv.innerHTML = `
                    <div class="analysis-result">
                        <div class="quality-score" style="color: ${color};">${quality}%</div>
                        <div style="text-align: center;">جودة الكود</div>
                        <div style="margin-top: 15px;"><strong>📊 التعقيد:</strong> ${data.analysis.complexity}</div>
                        
                        ${data.analysis.issues && data.analysis.issues.length > 0 ? `
                            <div style="margin-top: 15px;"><strong>⚠️ المشاكل المكتشفة:</strong></div>
                            ${data.analysis.issues.map(issue => `<div class="issue-item">${issue}</div>`).join('')}
                        ` : '<div class="issue-item" style="background: rgba(16,185,129,0.2); border-right-color: var(--success);">✅ لا توجد مشاكل واضحة! كود ممتاز</div>'}
                        
                        ${data.analysis.suggestions && data.analysis.suggestions.length > 0 ? `
                            <div style="margin-top: 15px;"><strong>💡 اقتراحات للتحسين:</strong></div>
                            ${data.analysis.suggestions.map(sugg => `<div class="suggestion-item">${sugg}</div>`).join('')}
                        ` : ''}
                    </div>
                `;
            }
        } catch(e) {
            resultDiv.innerHTML = '<p style="color: var(--danger);">⚠️ حدث خطأ في تحليل الكود</p>';
        }
    }
    
    async function explainCode() {
        const code = document.getElementById('codeInput').value;
        
        if (!code.trim()) {
            alert('الرجاء إدخال كود لشرحه');
            return;
        }
        
        const resultDiv = document.getElementById('analysisResult');
        resultDiv.innerHTML = '<p style="text-align: center;"><i class="fas fa-spinner fa-pulse"></i> AI يشرح الكود...</p>';
        
        try {
            const res = await fetch('/api/code/explain', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code, question: 'اشرح لي هذا الكود' })
            });
            const data = await res.json();
            
            resultDiv.innerHTML = `
                <div class="analysis-result">
                    <div><strong>🤖 شرح AI:</strong></div>
                    <div style="margin-top: 10px; line-height: 1.7;">${data.explanation || 'جاري التحليل...'}</div>
                    <div style="margin-top: 15px; font-size: 12px; color: var(--text-dim);">
                        📊 جودة الكود: ${data.analysis?.quality_score || 0}% | 🔍 تم العثور على ${data.similar_codes || 0} كود مشابه
                    </div>
                </div>
            `;
        } catch(e) {
            resultDiv.innerHTML = '<p style="color: var(--danger);">⚠️ حدث خطأ</p>';
        }
    }
    
    async function searchCode() {
        const query = document.getElementById('searchQuery').value;
        
        if (!query.trim()) {
            alert('الرجاء إدخال سؤال للبحث');
            return;
        }
        
        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = '<p style="text-align: center;"><i class="fas fa-spinner fa-pulse"></i> جاري البحث...</p>';
        
        try {
            const res = await fetch('/api/code/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await res.json();
            
            if (data.results && data.results.length > 0) {
                resultsDiv.innerHTML = data.results.map(r => `
                    <div class="search-result">
                        <div><strong>📁 ${r.metadata?.file || 'كود'}</strong> <span style="color: var(--gold);">🎯 ثقة: ${(r.score * 100).toFixed(0)}%</span></div>
                        <div style="font-size: 13px; margin-top: 8px; color: var(--text-dim);">${r.content}</div>
                        <div style="font-size: 11px; margin-top: 5px;">🏷️ ${r.metadata?.type || 'code'} | 💻 ${r.metadata?.language || 'Unknown'}</div>
                    </div>
                `).join('');
            } else {
                resultsDiv.innerHTML = '<p style="color: var(--text-dim);">🔍 لا توجد نتائج. حاول بسؤال مختلف.</p>';
            }
        } catch(e) {
            resultsDiv.innerHTML = '<p style="color: var(--danger);">⚠️ حدث خطأ في البحث</p>';
        }
    }
</script>
</body>
</html>
