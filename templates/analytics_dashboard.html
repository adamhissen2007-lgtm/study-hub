<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحليلات الذكية - Study Hub AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(99,102,241,0.3);
        }
        .header h1 {
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 i { color: #fbbf24; }
        .header a {
            background: rgba(255,255,255,0.1);
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid rgba(99,102,241,0.2);
        }
        .stat-card:hover { transform: translateY(-5px); border-color: #fbbf24; }
        .stat-value {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .stat-label { color: #94a3b8; margin-top: 8px; }
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(99,102,241,0.2);
        }
        .chart-card h3 {
            color: white;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        canvas { max-height: 300px; width: 100%; }
        .prediction-card {
            background: linear-gradient(135deg, #1e1b4b, #0f172a);
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #fbbf24;
        }
        .prediction-card h3 { color: #fbbf24; margin-bottom: 15px; }
        .prediction-text { color: #e2e8f0; font-size: 18px; line-height: 1.6; }
        .recommendations-list { display: flex; flex-direction: column; gap: 12px; }
        .rec-item {
            background: #1e293b;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn {
            background: #4f46e5;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            text-decoration: none;
        }
        @media (max-width: 800px) {
            .charts-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-chart-line"></i> لوحة التحليلات الذكية</h1>
        <a href="/dashboard"><i class="fas fa-arrow-right"></i> العودة للوحة</a>
    </div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value" id="totalPoints">0</div><div class="stat-label">⭐ إجمالي النقاط</div></div>
        <div class="stat-card"><div class="stat-value" id="studyStreak">0</div><div class="stat-label">🔥 أيام متواصلة</div></div>
        <div class="stat-card"><div class="stat-value" id="levelProgress">0%</div><div class="stat-label">📈 التقدم للمستوى التالي</div></div>
        <div class="stat-card"><div class="stat-value" id="rankPercent">0%</div><div class="stat-label">🏆 أعلى من</div></div>
    </div>

    <div class="prediction-card" id="predictionCard">
        <h3><i class="fas fa-robot"></i> 🔮 توقع ذكي من AI</h3>
        <div class="prediction-text" id="predictionText">جاري تحليل بياناتك...</div>
    </div>

    <div class="charts-row">
        <div class="chart-card">
            <h3><i class="fas fa-chart-line"></i> تقدم النقاط آخر 7 أيام</h3>
            <canvas id="pointsChart"></canvas>
        </div>
        <div class="chart-card">
            <h3><i class="fas fa-chart-pie"></i> توزيع المواد</h3>
            <canvas id="coursesChart"></canvas>
        </div>
    </div>

    <div class="chart-card">
        <h3><i class="fas fa-lightbulb"></i> 💡 توصيات ذكية مخصصة لك</h3>
        <div class="recommendations-list" id="recommendationsList">
            <p style="color:#94a3b8;">جاري التحميل...</p>
        </div>
    </div>
</div>

<script>
    async function loadAnalytics() {
        try {
            const res = await fetch('/api/analytics-data');
            const data = await res.json();
            
            document.getElementById('totalPoints').innerText = data.total_points;
            document.getElementById('studyStreak').innerText = data.study_streak;
            document.getElementById('levelProgress').innerText = data.level_progress + '%';
            document.getElementById('rankPercent').innerText = data.rank_percentile + '%';
            
            document.getElementById('predictionText').innerHTML = data.ai_prediction;
            
            const ctx = document.getElementById('pointsChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.points_history_dates,
                    datasets: [{
                        label: 'النقاط',
                        data: data.points_history_values,
                        borderColor: '#fbbf24',
                        backgroundColor: 'rgba(251,191,36,0.1)',
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#fbbf24',
                        pointBorderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#fff' } },
                        x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#fff', rotation: 45 } }
                    }
                }
            });
            
            const ctx2 = document.getElementById('coursesChart').getContext('2d');
            new Chart(ctx2, {
                type: 'pie',
                data: {
                    labels: data.courses_names,
                    datasets: [{
                        data: data.courses_points,
                        backgroundColor: ['#fbbf24', '#f59e0b', '#10b981', '#06b6d4', '#8b5cf6', '#ec4899']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#fff' } } }
                }
            });
            
            const recList = document.getElementById('recommendationsList');
            if(data.recommendations && data.recommendations.length) {
                recList.innerHTML = data.recommendations.map(rec => `
                    <div class="rec-item">
                        <div>
                            <strong style="color: #fbbf24;">${escapeHtml(rec.title)}</strong>
                            <p style="color: #94a3b8; font-size: 12px;">${escapeHtml(rec.reason)}</p>
                        </div>
                        <a href="${rec.link}" class="btn">عرض</a>
                    </div>
                `).join('');
            } else {
                recList.innerHTML = '<p style="color:#94a3b8;">لا توجد توصيات جديدة حالياً</p>';
            }
        } catch(e) {
            console.log(e);
            document.getElementById('predictionText').innerHTML = '⚠️ حدث خطأ في تحميل البيانات';
        }
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    loadAnalytics();
    setInterval(loadAnalytics, 30000);
</script>
</body>
</html>
