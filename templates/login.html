<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Study Hub AI</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* animated background particles */
        .particle {
            position: absolute;
            background: rgba(139, 92, 246, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 20s infinite linear;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        .login-container {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 50px 40px;
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease-out;
            position: relative;
            z-index: 10;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo i {
            font-size: 60px;
            background: linear-gradient(135deg, #8b5cf6, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .logo h1 {
            color: white;
            font-size: 28px;
            margin-top: 10px;
        }
        
        .logo p {
            color: #9ca3af;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            color: #e5e7eb;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .input-group .input-wrapper {
            position: relative;
        }
        
        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b5cf6;
            font-size: 18px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 45px 14px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }
        
        .input-group input.error {
            border-color: #ef4444;
        }
        
        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #9ca3af;
            cursor: pointer;
        }
        
        .remember-me input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #8b5cf6;
        }
        
        .forgot-password {
            color: #8b5cf6;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .forgot-password:hover {
            color: #fbbf24;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.4);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .magic-login {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 15px;
            border-top: 1px solid #334155;
        }
        
        .magic-link {
            background: transparent;
            border: 1px solid #8b5cf6;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            color: #8b5cf6;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .magic-link:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: #fbbf24;
            color: #fbbf24;
        }
        
        .register-link {
            text-align: center;
            color: #9ca3af;
        }
        
        .register-link a {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: bold;
        }
        
        .register-link a:hover {
            color: #fbbf24;
        }
        
        .alert {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            border-radius: 30px;
            padding: 12px 20px;
            margin-bottom: 20px;
            color: #fca5a5;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alert i {
            font-size: 18px;
        }
        
        .security-badge {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        @media (max-width: 500px) {
            .login-container {
                padding: 30px 25px;
            }
            .options {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
        
        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
        
        .btn-loading .btn-text {
            display: none;
        }
        
        .btn-loading .spinner {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div id="particles-container"></div>
    
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
            <h1>Study Hub AI</h1>
            <p>منصة التعليم الذكية</p>
        </div>
        
        {% if error %}
        <div class="alert">
            <i class="fas fa-exclamation-triangle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}
        
        <form method="POST" action="/login" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="fingerprint" id="fingerprintInput">
            
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" id="email" placeholder="example@eru.edu.eg" required autocomplete="email">
                </div>
                <div class="error-message" id="emailError"></div>
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-lock"></i> كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <div class="error-message" id="passwordError"></div>
            </div>
            
            <div class="options">
                <label class="remember-me">
                    <input type="checkbox" name="remember"> تذكرني
                </label>
                <a href="/forgot-password" class="forgot-password">نسيت كلمة المرور؟</a>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">
                <span class="btn-text">تسجيل الدخول</span>
                <span class="spinner hidden"></span>
            </button>
        </form>
        
        <div class="magic-login">
            <button class="magic-link" onclick="showMagicLogin()">
                <i class="fas fa-magic"></i>
                <span>تسجيل الدخول السحري (Magic Link)</span>
            </button>
        </div>
        
        <div class="register-link">
            ليس لديك حساب؟ <a href="/register">إنشاء حساب جديد</a>
        </div>
    </div>
    
    <div class="security-badge">
        <i class="fas fa-shield-alt"></i>
        <span>🔐 اتصال آمن | حماية CSRF + بصمة المتصفح</span>
    </div>
    
    <script>
        // توليد البصمة وحماية CSRF
        let visitorId = null;
        
        // إنشاء جزيئات خلفية متحركة
        function createParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 15 + 10 + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(particle);
            }
        }
        
        // الحصول على بصمة المتصفح
        FingerprintJS.load().then(fp => {
            fp.get().then(result => {
                visitorId = result.visitorId;
                document.getElementById('fingerprintInput').value = visitorId;
            });
        });
        
        function validateEmail(email) {
            const re = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            return re.test(email);
        }
        
        function showFieldError(fieldId, message) {
            const errorDiv = document.getElementById(fieldId + 'Error');
            const input = document.getElementById(fieldId);
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            input.classList.add('error');
        }
        
        function hideFieldError(fieldId) {
            const errorDiv = document.getElementById(fieldId + 'Error');
            const input = document.getElementById(fieldId);
            errorDiv.style.display = 'none';
            input.classList.remove('error');
        }
        
        // التحقق من صحة النموذج قبل الإرسال
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            let isValid = true;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // التحقق من البريد الإلكتروني
            if (!email) {
                showFieldError('email', 'البريد الإلكتروني مطلوب');
                isValid = false;
            } else if (!validateEmail(email)) {
                showFieldError('email', 'البريد الإلكتروني غير صحيح');
                isValid = false;
            } else {
                hideFieldError('email');
            }
            
            // التحقق من كلمة المرور
            if (!password) {
                showFieldError('password', 'كلمة المرور مطلوبة');
                isValid = false;
            } else if (password.length < 8) {
                showFieldError('password', 'كلمة المرور يجب أن تكون 8 أحرف على الأقل');
                isValid = false;
            } else {
                hideFieldError('password');
            }
            
            if (!isValid) {
                e.preventDefault();
                return false;
            }
            
            // إظهار loading
            const btn = document.getElementById('loginBtn');
            btn.classList.add('btn-loading');
            btn.disabled = true;
            btn.querySelector('.btn-text').classList.add('hidden');
            btn.querySelector('.spinner').classList.remove('hidden');
            
            return true;
        });
        
        // إزالة أخطاء الحقل عند الكتابة
        document.getElementById('email').addEventListener('input', () => hideFieldError('email'));
        document.getElementById('password').addEventListener('input', () => hideFieldError('password'));
        
        function showMagicLogin() {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showFieldError('email', 'أدخل بريدك الإلكتروني أولاً');
                return;
            }
            if (!validateEmail(email)) {
                showFieldError('email', 'البريد الإلكتروني غير صحيح');
                return;
            }
            
            // إنشاء form مخفي وإرسال طلب magic login
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/magic-login';
            form.style.display = 'none';
            
            const csrfInput = document.createElement('input');
            csrfInput.name = 'csrf_token';
            csrfInput.value = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
            form.appendChild(csrfInput);
            
            const emailInput = document.createElement('input');
            emailInput.name = 'email';
            emailInput.value = email;
            form.appendChild(emailInput);
            
            document.body.appendChild(form);
            form.submit();
        }
        
        createParticles();
        
        // إضافة حدث Enter للحقول
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('password').focus();
            }
        });
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
