<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>السبورة التعاونية المتطورة - Study Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e293b;
            --surface: #0f172a;
            --border: #334155;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --gold: #fbbf24;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { overflow: hidden; background: var(--surface); }
        
        /* شريط الأدوات الجانبي */
        #sidebar { position: fixed; top: 0; left: 0; width: 60px; height: 100vh; background: var(--bg); border-right: 1px solid var(--border); z-index: 10; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 10px; }
        #sidebar button { width: 44px; height: 44px; border-radius: 12px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 18px; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
        #sidebar button:hover { background: rgba(99, 102, 241, 0.2); color: white; }
        #sidebar button.active { background: var(--accent); color: white; box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
        #sidebar .separator { width: 30px; height: 1px; background: var(--border); margin: 10px 0; }
        
        /* شريط الأدوات العلوي */
        #topbar { position: fixed; top: 0; left: 60px; right: 0; height: 50px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 10; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        #topbar button { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s; display: flex; align-items: center; gap: 6px; }
        #topbar button:hover { border-color: var(--accent); color: white; }
        #topbar button.active { background: var(--accent); color: white; border-color: var(--accent); }
        #topbar input[type="color"] { width: 32px; height: 32px; border-radius: 8px; border: 2px solid var(--border); cursor: pointer; padding: 2px; }
        #topbar select { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; outline: none; cursor: pointer; font-family: 'Tajawal'; }
        #topbar label { color: var(--text-secondary); font-size: 12px; font-weight: 600; }
        
        /* شريط الحالة السفلي */
        #bottombar { position: fixed; bottom: 0; left: 60px; right: 0; height: 30px; background: var(--bg); border-top: 1px solid var(--border); z-index: 10; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; font-size: 11px; color: var(--text-secondary); }
        
        /* منطقة الرسم */
        canvas { display: block; position: absolute; top: 50px; left: 60px; }
        
        /* صندوق النص */
        #textInput { position: fixed; display: none; z-index: 100; background: transparent; border: 2px dashed var(--accent); color: var(--text); font-size: 18px; font-family: 'Tajawal'; outline: none; padding: 5px 10px; border-radius: 6px; min-width: 100px; }
        
        /* مؤشر الليزر */
        #laserPointer { position: fixed; width: 20px; height: 20px; background: radial-gradient(circle, rgba(255,0,0,0.8) 0%, rgba(255,0,0,0) 70%); border-radius: 50%; pointer-events: none; z-index: 1000; display: none; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <!-- شريط الأدوات الجانبي -->
    <div id="sidebar">
        <button onclick="setTool('pen')" id="penTool" class="active" title="قلم ✏️">✏️</button>
        <button onclick="setTool('highlighter')" id="highlighterTool" title="مؤشر 🖍️">🖍️</button>
        <button onclick="setTool('eraser')" id="eraserTool" title="مساحة 🧹">🧹</button>
        <div class="separator"></div>
        <button onclick="setTool('text')" id="textTool" title="نص 📝">T</button>
        <button onclick="setTool('laser')" id="laserTool" title="مؤشر ليزر 🔴">🔴</button>
        <button onclick="setTool('shape')" id="shapeTool" title="أشكال ⬜">⬜</button>
        <div class="separator"></div>
        <button onclick="undo()" title="تراجع ↩️">↩️</button>
        <button onclick="redo()" title="إعادة ↪️">↪️</button>
        <div class="separator"></div>
        <button onclick="clearCanvas()" title="مسح الكل 🗑️">🗑️</button>
        <button onclick="saveCanvas()" title="حفظ 💾">💾</button>
    </div>
    
    <!-- شريط الأدوات العلوي -->
    <div id="topbar">
        <label>اللون:</label>
        <input type="color" id="colorPicker" value="#ffffff" onchange="setColor(this.value)">
        <label>الحجم:</label>
        <input type="range" id="sizeSlider" min="1" max="30" value="4" onchange="setSize(this.value)">
        <span id="sizeValue" style="color: var(--text-secondary); font-size: 12px; min-width: 20px;">4</span>
        <span style="flex: 1;"></span>
        <button onclick="toggleGrid()" id="gridBtn">📐 شبكة</button>
        <button onclick="loadImage()">🖼️ صورة</button>
        <button onclick="saveCanvas()">💾 تصدير PNG</button>
        <a href="/dashboard" style="text-decoration: none; margin-left: 10px;">
            <button>← العودة</button>
        </a>
    </div>
    
    <!-- شريط الحالة السفلي -->
    <div id="bottombar">
        <span id="cursorPos">X: 0, Y: 0</span>
        <span id="toolStatus">الأداة: ✏️ قلم</span>
        <span id="userCount">👤 1 متصل</span>
    </div>
    
    <!-- منطقة الرسم -->
    <canvas id="whiteboard"></canvas>
    
    <!-- صندوق النص -->
    <input type="text" id="textInput" placeholder="اكتب هنا..." onkeypress="if(event.key==='Enter')placeText()">
    
    <!-- مؤشر الليزر -->
    <div id="laserPointer"></div>

    <script>
        const canvas = document.getElementById('whiteboard');
        const ctx = canvas.getContext('2d');
        const textInput = document.getElementById('textInput');
        const laserPointer = document.getElementById('laserPointer');
        
        // إعدادات
        let tool = 'pen', color = '#ffffff', size = 4, isDrawing = false;
        let showGrid = false, gridSize = 40;
        let undoStack = [], redoStack = [];
        let startX, startY;
        
        // تهيئة
        function initCanvas() {
            canvas.width = window.innerWidth - 60;
            canvas.height = window.innerHeight - 80;
            drawGrid();
        }
        initCanvas();
        saveState();
        
        // تغيير الأداة
        function setTool(t) {
            tool = t;
            document.querySelectorAll('#sidebar button').forEach(b => b.classList.remove('active'));
            document.getElementById(t + 'Tool')?.classList.add('active');
            document.getElementById('toolStatus').textContent = `الأداة: ${getToolEmoji(t)} ${getToolName(t)}`;
            
            if (t === 'text') {
                textInput.style.display = 'block';
                textInput.focus();
            } else {
                textInput.style.display = 'none';
            }
        }
        
        function getToolEmoji(t) { return {pen:'✏️', highlighter:'🖍️', eraser:'🧹', text:'T', laser:'🔴', shape:'⬜'}[t] || '✏️'; }
        function getToolName(t) { return {pen:'قلم', highlighter:'مؤشر', eraser:'مساحة', text:'نص', laser:'ليزر', shape:'أشكال'}[t] || 'قلم'; }
        
        // إعدادات اللون والحجم
        function setColor(c) { color = c; }
        function setSize(s) { size = s; document.getElementById('sizeValue').textContent = s; }
        
        // حفظ واسترجاع الحالة
        function saveState() {
            undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            redoStack = [];
        }
        
        function undo() {
            if (undoStack.length <= 1) return;
            redoStack.push(undoStack.pop());
            const state = undoStack[undoStack.length - 1];
            ctx.putImageData(state, 0, 0);
        }
        
        function redo() {
            if (redoStack.length === 0) return;
            const state = redoStack.pop();
            undoStack.push(state);
            ctx.putImageData(state, 0, 0);
        }
        
        // مسح وحفظ
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            saveState();
        }
        
        function saveCanvas() {
            const link = document.createElement('a');
            link.download = 'whiteboard_' + new Date().toISOString().slice(0,10) + '.png';
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // الشبكة
        function toggleGrid() {
            showGrid = !showGrid;
            document.getElementById('gridBtn').classList.toggle('active', showGrid);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (showGrid) drawGrid();
            saveState();
        }
        
        function drawGrid() {
            if (!showGrid) return;
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            for (let y = 0; y < canvas.height; y += gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
        }
        
        // تحميل صورة
        function loadImage() {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => { ctx.drawImage(img, 100, 100, 300, 200); saveState(); };
                    img.src = event.target.result;
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        // أحداث الرسم
        canvas.addEventListener('mousedown', (e) => {
            if (tool === 'laser') { laserPointer.style.display = 'block'; return; }
            if (tool === 'text') { placeTextAt(e.clientX - 60, e.clientY - 50); return; }
            isDrawing = true;
            startX = e.clientX - 60;
            startY = e.clientY - 50;
            ctx.beginPath();
            ctx.moveTo(startX, startY);
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const x = e.clientX - 60, y = e.clientY - 50;
            document.getElementById('cursorPos').textContent = `X: ${Math.round(x)}, Y: ${Math.round(y)}`;
            
            if (tool === 'laser') {
                laserPointer.style.left = e.clientX + 'px';
                laserPointer.style.top = e.clientY + 'px';
                return;
            }
            if (!isDrawing) return;
            
            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (tool === 'pen') { ctx.strokeStyle = color; ctx.globalAlpha = 1; }
            else if (tool === 'highlighter') { ctx.strokeStyle = color; ctx.globalAlpha = 0.4; ctx.lineWidth = size * 2; }
            else if (tool === 'eraser') { ctx.strokeStyle = '#0f172a'; ctx.globalAlpha = 1; ctx.lineWidth = size * 3; }
            else if (tool === 'shape') { return; }
            
            ctx.lineTo(x, y);
            ctx.stroke();
        });
        
        canvas.addEventListener('mouseup', (e) => {
            if (tool === 'laser') { laserPointer.style.display = 'none'; return; }
            if (tool === 'shape' && isDrawing) {
                const endX = e.clientX - 60, endY = e.clientY - 50;
                ctx.strokeStyle = color; ctx.lineWidth = size; ctx.globalAlpha = 1;
                ctx.beginPath(); ctx.rect(startX, startY, endX - startX, endY - startY); ctx.stroke();
            }
            isDrawing = false;
            saveState();
        });
        
        // النص
        function placeTextAt(x, y) {
            textInput.style.left = x + 'px';
            textInput.style.top = y + 'px';
            textInput.style.display = 'block';
            textInput.focus();
        }
        
        function placeText() {
            const text = textInput.value;
            if (!text) return;
            ctx.font = `${size*4}px Tajawal`;
            ctx.fillStyle = color;
            ctx.fillText(text, parseInt(textInput.style.left), parseInt(textInput.style.top) + 30);
            textInput.style.display = 'none';
            textInput.value = '';
            saveState();
        }
        
        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
