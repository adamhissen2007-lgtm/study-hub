<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإشعارات - Study Hub</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 20px; min-height: 100vh; color: white; }
        .container { max-width: 800px; margin: 0 auto; }
        .page-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        h1 { font-size: 32px; }
        .back-link { color: #a78bfa; text-decoration: none; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 50px; }
        .notification-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px; transition: all 0.3s; text-decoration: none; color: inherit; }
        .notification-card.unread { background: rgba(99, 102, 241, 0.15); border-right: 4px solid #6366f1; }
        .notification-card:hover { background: rgba(255,255,255,0.08); }
        .notification-icon { width: 50px; height: 50px; border-radius: 15px; background: #6366f1; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .notification-content { flex: 1; }
        .notification-content p { margin-bottom: 5px; }
        .notification-time { color: #94a3b8; font-size: 12px; }
        .unread-dot { width: 12px; height: 12px; background: #6366f1; border-radius: 50%; }
        .empty-state { text-align: center; padding: 60px; color: #94a3b8; }
        .empty-state i { font-size: 60px; margin-bottom: 20px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <a href="/dashboard" class="back-link"><i class="fas fa-arrow-right"></i> العودة</a>
            <h1><i class="fas fa-bell" style="margin-left: 10px; color: #fbbf24;"></i>الإشعارات</h1>
        </div>

        {% if notifications %}
            {% for notif in notifications %}
            <a href="/notifications/read/{{ notif.id }}" class="notification-card {% if not notif.is_read %}unread{% endif %}">
                <div class="notification-icon">
                    <i class="fas fa-comment"></i>
                </div>
                <div class="notification-content">
                    <p>{{ notif.message }}</p>
                    <span class="notification-time"><i class="far fa-clock"></i> {{ notif.created_at.strftime('%Y-%m-%d %H:%M') }}</span>
                </div>
                {% if not notif.is_read %}
                <div class="unread-dot"></div>
                {% endif %}
            </a>
            {% endfor %}
        {% else %}
            <div class="empty-state">
                <i class="fas fa-bell-slash"></i>
                <p>لا توجد إشعارات حالياً</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
