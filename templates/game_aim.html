<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التركيز البصري - العقل الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body {
            background: linear-gradient(135deg, #0b1120, #030712);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            background: #111827;
            border-radius: 48px;
            padding: 40px;
            text-align: center;
        }
        h1 { color: #fbbf24; margin-bottom: 20px; }
        .arena {
            background: #0f172a;
            border-radius: 24px;
            width: 500px;
            height: 400px;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
            cursor: crosshair;
        }
        .target {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #ef4444;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.1s;
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        .score { font-size: 24px; color: #10b981; margin: 15px 0; }
        .timer { font-size: 24px; color: #fbbf24; margin: 10px 0; }
        .btn { background: #6366f1; border: none; padding: 12px 30px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .message { margin-top: 20px; color: #fbbf24; }
        @media (max-width: 600px) { .arena { width: 320px; height: 300px; } .target { width: 40px; height: 40px; font-size: 18px; } }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🎯 التركيز البصري - اضرب الهدف</h1>
    <div class="timer">⏱️ الوقت: <span id="timer">30</span> ثانية</div>
    <div class="score">⭐ النقاط: <span id="score">0</span> | 🎯 الضربات: <span id="hits">0</span></div>
    <div id="arena" class="arena" onclick="shoot(event)"></div>
    <button class="btn" onclick="startGame()">🎮 ابدأ اللعبة</button>
    <div class="message" id="message"></div>
</div>

<script>
    let score = 0;
    let hits = 0;
    let timeLeft = 30;
    let gameActive = false;
    let timerInterval = null;
    let targetInterval = null;
    let currentTarget = null;
    
    function startGame() {
        score = 0;
        hits = 0;
        timeLeft = 30;
        gameActive = true;
        document.getElementById('score').innerText = score;
        document.getElementById('hits').innerText = hits;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('message').innerHTML = '';
        
        if(timerInterval) clearInterval(timerInterval);
        if(targetInterval) clearInterval(targetInterval);
        
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                clearInterval(targetInterval);
                if(currentTarget) currentTarget.remove();
                gameActive = false;
                const xpEarned = score * 2;
                document.getElementById('message').innerHTML = `🎉 وقت انتهى! حصلت على ${xpEarned} نقطة خبرة!`;
                fetch('/api/academic/complete-course', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ points: xpEarned, course_name: 'التركيز البصري' })
                });
                setTimeout(() => { window.location.href = '/smart-games'; }, 2000);
            }
        }, 1000);
        
        spawnTarget();
    }
    
    function spawnTarget() {
        if(!gameActive) return;
        if(currentTarget) currentTarget.remove();
        
        const arena = document.getElementById('arena');
        const target = document.createElement('div');
        target.className = 'target';
        const x = Math.random() * (arena.clientWidth - 50);
        const y = Math.random() * (arena.clientHeight - 50);
        target.style.left = x + 'px';
        target.style.top = y + 'px';
        target.innerHTML = '🎯';
        target.onclick = (e) => {
            e.stopPropagation();
            if(gameActive) {
                hits++;
                score += 10;
                document.getElementById('score').innerText = score;
                document.getElementById('hits').innerText = hits;
                target.remove();
                spawnTarget();
            }
        };
        arena.appendChild(target);
        currentTarget = target;
        
        targetInterval = setTimeout(() => {
            if(currentTarget && gameActive) {
                target.remove();
                spawnTarget();
            }
        }, 1500);
    }
    
    function shoot(event) {
        if(gameActive && event.target.id === 'arena') {
            // Missed!
        }
    }
</script>
</body>
</html>
