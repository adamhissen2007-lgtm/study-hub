<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub - منصة التعلم الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            position: relative;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        /* Dark/Light Mode */
        body.light-mode {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }
        body.light-mode .hero-card {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(0,0,0,0.1);
        }
        body.light-mode h1 {
            background: linear-gradient(135deg, #0f172a, #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
        }
        body.light-mode .subtitle,
        body.light-mode .footer-text,
        body.light-mode .stat-label,
        body.light-mode .feature {
            color: #334155;
        }
        body.light-mode .btn-secondary {
            color: #4f46e5;
            border-color: #4f46e5;
        }
        body.light-mode .eru-logo-text {
            color: #0f172a;
        }
        body.light-mode .made-by {
            color: #475569;
        }

        /* خلفية متحركة */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .animated-bg span {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            animation: floatUp 15s infinite linear;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }

        .animated-bg span:nth-child(1) { left: 10%; animation-duration: 12s; width: 30px; height: 30px; }
        .animated-bg span:nth-child(2) { left: 20%; animation-duration: 18s; width: 15px; height: 15px; animation-delay: 2s; }
        .animated-bg span:nth-child(3) { left: 35%; animation-duration: 14s; width: 25px; height: 25px; animation-delay: 4s; }
        .animated-bg span:nth-child(4) { left: 50%; animation-duration: 20s; width: 10px; height: 10px; animation-delay: 1s; }
        .animated-bg span:nth-child(5) { left: 65%; animation-duration: 16s; width: 35px; height: 35px; animation-delay: 3s; }
        .animated-bg span:nth-child(6) { left: 80%; animation-duration: 22s; width: 20px; height: 20px; animation-delay: 5s; }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* البطاقة الرئيسية */
        .hero-card {
            max-width: 550px;
            width: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 64px;
            padding: 50px 40px;
            text-align: center;
            border: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .hero-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.6);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* لوجو Study Hub */
        .logo {
            font-size: 65px;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            display: inline-block;
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(99,102,241,0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(168,85,247,0.8)); }
        }

        h1 {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 18px;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        /* لوجو الجامعة */
        .university-brand {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .eru-logo {
            width: 40px;
            height: 40px;
            background: #1e3a8a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 20px;
        }
        .eru-logo-text {
            color: #fbbf24;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 1px;
        }
        .eru-logo-sub {
            font-size: 11px;
            color: #94a3b8;
        }

        /* إحصائيات */
        .stats-showcase {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            letter-spacing: 0.5px;
        }

        /* الأزرار */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 35px;
        }

        .btn {
            display: block;
            padding: 18px 30px;
            border-radius: 60px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(95deg, #6366f1, #a855f7);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5);
            border: none;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 35px -8px rgba(99, 102, 241, 0.7);
        }

        .btn-secondary {
            background: transparent;
            color: #c084fc;
            border: 2px solid #c084fc;
        }

        .btn-secondary:hover {
            background: rgba(168, 85, 247, 0.1);
            transform: translateY(-3px);
            border-color: #a855f7;
        }

        /* مميزات المنصة */
        .features {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
        }

        .feature i {
            color: #fbbf24;
            font-size: 14px;
        }

        /* التوقيع */
        .made-by {
            margin-top: 35px;
            font-size: 12px;
            color: #475569;
            text-align: center;
        }
        .made-by i {
            color: #ec4899;
            margin: 0 4px;
        }
        .made-by a {
            color: #a855f7;
            text-decoration: none;
            font-weight: 700;
        }

        /* أزرار التحكم */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .theme-toggle:hover {
            background: #4f46e5;
            transform: scale(1.05);
        }

        .voice-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(251,191,36,0.4);
            z-index: 1000;
            transition: all 0.3s;
            animation: float 3s ease-in-out infinite;
            border: none;
            color: black;
        }

        .voice-fab:hover {
            transform: scale(1.15);
            box-shadow: 0 15px 35px rgba(251,191,36,0.6);
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @media (max-width: 550px) {
            .hero-card { padding: 35px 25px; }
            h1 { font-size: 32px; }
            .logo { font-size: 50px; }
        }
    </style>
</head>
<body>
<div class="animated-bg">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
</div>

<button class="theme-toggle" id="themeToggle">🌙</button>

<div class="container">
    <div class="hero-card">
        <!-- لوجو الجامعة -->
        <div class="university-brand">
            <div class="eru-logo">
                <span>ERU</span>
            </div>
            <div>
                <div class="eru-logo-text">الجامعة الروسية</div>
                <div class="eru-logo-sub">Russian University</div>
            </div>
        </div>

        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>Study Hub</h1>
        <p class="subtitle">منصتك الذكية للمذاكرة بالذكاء الاصطناعي<br>خطط، اختبر، تفوق!</p>

        <div class="stats-showcase">
            <div class="stat-item">
                <div class="stat-number" id="studentStat">0</div>
                <div class="stat-label">طالب متفوق</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="materialStat">0</div>
                <div class="stat-label">مورد تعليمي</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">24/7</div>
                <div class="stat-label">دعم AI</div>
            </div>
        </div>

        <div class="btn-group">
            <a href="/login" class="btn btn-primary">
                <i class="fas fa-rocket"></i> ابدأ رحلتك الآن
            </a>
            <a href="/register" class="btn btn-secondary">
                <i class="fas fa-user-plus"></i> إنشاء حساب جديد
            </a>
        </div>

        <div class="features">
            <div class="feature"><i class="fas fa-robot"></i> ذكاء اصطناعي</div>
            <div class="feature"><i class="fas fa-layer-group"></i> بطاقات تعليمية</div>
            <div class="feature"><i class="fas fa-chalkboard"></i> سبورة تفاعلية</div>
            <div class="feature"><i class="fas fa-video"></i> مكالمات فيديو</div>
        </div>

        <!-- التوقيع -->
        <div class="made-by">
            Made with <i class="fas fa-heart"></i> by <a href="#">Adam Hussien</a>
        </div>
    </div>
</div>

<button class="voice-fab" id="voiceWelcomeBtn" onclick="speakWelcome()">
    <i class="fas fa-headphones"></i>
</button>

<script>
    // الترحيب الصوتي
    function speakWelcome() {
        const msg = new SpeechSynthesisUtterance('مرحباً بك في ستادي هاب! منصتك التعليمية المتكاملة بالذكاء الاصطناعي. سجل دخول وابدأ رحلة التفوق الآن!');
        msg.lang = 'ar-SA';
        msg.rate = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(msg);
        
        const btn = document.getElementById('voiceWelcomeBtn');
        btn.style.transform = 'scale(1.2)';
        setTimeout(() => btn.style.transform = '', 300);
    }

    // إحصائيات متحركة
    async function fetchStats() {
        try {
            const res = await fetch('/api/knowledge-stats');
            const data = await res.json();
            animateNumber('studentStat', 287, 320);
            animateNumber('materialStat', data.total_facts || 1240, 1500);
        } catch(e) {
            animateNumber('studentStat', 287, 320);
            animateNumber('materialStat', 1240, 1500);
        }
    }

    function animateNumber(elementId, start, end) {
        const el = document.getElementById(elementId);
        let current = start;
        const increment = Math.ceil((end - start) / 40);
        const timer = setInterval(() => {
            current += increment;
            if (current >= end) {
                el.innerText = end;
                clearInterval(timer);
            } else {
                el.innerText = current;
            }
        }, 25);
    }

    // Dark/Light Mode
    function initTheme() {
        const toggle = document.getElementById('themeToggle');
        const isDark = localStorage.getItem('darkMode') === 'true';
        if (!isDark) document.body.classList.add('light-mode');
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const darkMode = document.body.classList.contains('light-mode');
            localStorage.setItem('darkMode', darkMode);
            toggle.innerHTML = darkMode ? '☀️' : '🌙';
        });
    }

    fetchStats();
    initTheme();

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js').then(reg => console.log('SW registered')).catch(err => console.log('SW failed'));
    }
</script>
</body>
</html>
