<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرك الأحداث - Study Hub AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #0b1120, #030712); padding: 40px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: rgba(17,24,39,0.9); border-radius: 30px; padding: 20px 30px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .header h1 { color: #fbbf24; display: flex; align-items: center; gap: 10px; }
        .back-btn { background: #4f46e5; color: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: #7c3aed; transform: translateY(-2px); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #111827; border-radius: 25px; padding: 25px; text-align: center; border: 1px solid #1f2937; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); border-color: #fbbf24; }
        .stat-number { font-size: 48px; font-weight: bold; background: linear-gradient(135deg, #fbbf24, #f97316); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-label { color: #9ca3af; margin-top: 10px; }
        .btn { background: linear-gradient(135deg, #4f46e5, #7c3aed); border: none; padding: 12px 25px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px; }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .events-list { background: #111827; border-radius: 25px; padding: 25px; margin-top: 30px; border: 1px solid #1f2937; }
        .events-list h3 { color: #fbbf24; margin-bottom: 20px; }
        .event-item { padding: 15px; border-bottom: 1px solid #1f2937; color: #e5e7eb; }
        .event-time { color: #9ca3af; font-size: 12px; margin-top: 5px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 20px; border-radius: 40px; z-index: 1000; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-broadcast-tower"></i> محرك الأحداث (Event Engine)</h1>
        <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للوحة</a>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" id="totalEvents">0</div>
            <div class="stat-label">إجمالي الأحداث</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="eventsLastHour">0</div>
            <div class="stat-label">أحداث آخر ساعة</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="activeUsers">0</div>
            <div class="stat-label">مستخدمين نشطين</div>
        </div>
    </div>

    <div style="text-align: center; margin-bottom: 30px;">
        <button class="btn" onclick="triggerTestEvent()"><i class="fas fa-flask"></i> تشغيل حدث تجريبي (+50 نقطة)</button>
        <button class="btn" onclick="refreshStats()"><i class="fas fa-sync-alt"></i> تحديث الإحصائيات</button>
    </div>

    <div class="events-list">
        <h3><i class="fas fa-history"></i> آخر الأحداث</h3>
        <div id="recentEvents">
            <div class="event-item" style="color: #6b7280; text-align: center;">لا توجد أحداث مسجلة بعد</div>
        </div>
    </div>
</div>

<script>
    async function refreshStats() {
        try {
            const response = await fetch('/api/events/stats');
            const stats = await response.json();
            document.getElementById('totalEvents').innerText = stats.total_events || 0;
            document.getElementById('eventsLastHour').innerText = stats.events_last_hour || 0;
            document.getElementById('activeUsers').innerText = stats.active_users || 0;
            
            if (stats.recent_events && stats.recent_events.length > 0) {
                const eventsDiv = document.getElementById('recentEvents');
                eventsDiv.innerHTML = stats.recent_events.map(e => `
                    <div class="event-item">
                        <i class="fas fa-bolt" style="color: #fbbf24;"></i> <strong>${e.type}</strong>
                        <div>${e.details || 'لا توجد تفاصيل'}</div>
                        <div class="event-time">${new Date(e.timestamp).toLocaleString('ar-EG')}</div>
                    </div>
                `).join('');
            }
            showToast('تم تحديث الإحصائيات بنجاح');
        } catch(e) {
            console.error(e);
            showToast('خطأ في تحميل الإحصائيات', 'error');
        }
    }

    async function triggerTestEvent() {
        try {
            const response = await fetch('/api/events/trigger-test', { method: 'POST' });
            const data = await response.json();
            if (data.success) {
                showToast('✅ تم تشغيل الحدث التجريبي! تمت إضافة 50 نقطة');
                refreshStats();
                setTimeout(() => { location.reload(); }, 1500);
            }
        } catch(e) {
            showToast('❌ حدث خطأ في تشغيل الحدث', 'error');
        }
    }

    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = type === 'error' ? '#ef4444' : '#10b981';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    refreshStats();
    setInterval(refreshStats, 30000);
</script>
</body>
</html>
