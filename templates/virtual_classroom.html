<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>الفصل الافتراضي - Study Hub Metaverse</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { overflow: hidden; background: #0a0a1a; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .ui-overlay { position: fixed; bottom: 20px; left: 20px; right: 20px; z-index: 100; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 15px; pointer-events: none; }
        .controls-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-radius: 60px; padding: 12px 20px; display: flex; gap: 12px; pointer-events: auto; border: 1px solid rgba(99,102,241,0.4); }
        .control-btn { background: #1e293b; border: none; width: 48px; height: 48px; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .control-btn:hover { background: #4f46e5; transform: scale(1.05); }
        .control-btn.primary { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
        .chat-area { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-radius: 24px; width: 320px; max-width: 90vw; pointer-events: auto; display: flex; flex-direction: column; border: 1px solid rgba(99,102,241,0.3); }
        .chat-header { padding: 12px 16px; border-bottom: 1px solid #334155; color: #fbbf24; font-weight: bold; display: flex; justify-content: space-between; }
        .chat-messages { height: 300px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .chat-message { background: #1e293b; padding: 8px 12px; border-radius: 16px; font-size: 13px; color: #e2e8f0; }
        .chat-message.own { background: #4f46e5; align-self: flex-end; }
        .chat-message strong { color: #fbbf24; }
        .chat-input { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #334155; }
        .chat-input input { flex: 1; background: #0f172a; border: none; padding: 10px 14px; border-radius: 30px; color: white; }
        .chat-input button { background: #4f46e5; border: none; width: 40px; border-radius: 50%; color: white; cursor: pointer; }
        .participants-list { padding: 8px 12px; border-top: 1px solid #334155; font-size: 12px; color: #94a3b8; display: flex; flex-wrap: wrap; gap: 6px; }
        .participant { background: #1e293b; padding: 4px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; }
        .exit-btn { background: #ef4444; color: white; border: none; padding: 12px 20px; border-radius: 40px; cursor: pointer; font-weight: bold; pointer-events: auto; }
        @media (max-width: 700px) { .controls-panel { padding: 8px 12px; gap: 6px; } .control-btn { width: 40px; height: 40px; font-size: 16px; } .chat-area { width: 280px; } }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-overlay">
        <div class="controls-panel">
            <button class="control-btn" id="move-forward"><i class="fas fa-arrow-up"></i></button>
            <button class="control-btn" id="move-back"><i class="fas fa-arrow-down"></i></button>
            <button class="control-btn" id="move-left"><i class="fas fa-arrow-left"></i></button>
            <button class="control-btn" id="move-right"><i class="fas fa-arrow-right"></i></button>
            <button class="control-btn" id="toggle-chat"><i class="fas fa-comment-dots"></i></button>
        </div>
        <div id="chat-container" class="chat-area" style="display: none;">
            <div class="chat-header"><span>الدردشة المباشرة</span><span id="online-count" style="background:#4f46e5; padding:2px 8px; border-radius:20px;">0</span></div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input"><input type="text" id="chat-input" placeholder="اكتب رسالة..."><button id="send-chat"><i class="fas fa-paper-plane"></i></button></div>
            <div class="participants-list" id="participants-list"></div>
        </div>
        <button class="exit-btn" id="exit-room"><i class="fas fa-sign-out-alt"></i> مغادرة الفصل</button>
    </div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.008);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.getElementById('canvas-container').appendChild(labelRenderer.domElement);
        
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.7 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(25, 25), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.5;
        floor.receiveShadow = true;
        scene.add(floor);
        const gridHelper = new THREE.GridHelper(25, 20, 0x4f46e5, 0x334155);
        gridHelper.position.y = -0.4;
        scene.add(gridHelper);
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x4f46e5 });
        const platform = new THREE.Mesh(new THREE.BoxGeometry(3, 0.2, 4), platformMat);
        platform.position.set(0, -0.4, -4);
        platform.castShadow = true;
        scene.add(platform);
        const boardMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const board = new THREE.Mesh(new THREE.BoxGeometry(6, 3.5, 0.2), boardMat);
        board.position.set(0, 1.2, -5.8);
        scene.add(board);
        
        let cameraPosition = { x: 0, y: 5, z: 15 };
        let moveSpeed = 0.3;
        function updateCamera() {
            camera.position.x += (cameraPosition.x - camera.position.x) * 0.1;
            camera.position.z += (cameraPosition.z - camera.position.z) * 0.1;
            camera.lookAt(0, 0.5, -2);
        }
        document.getElementById('move-forward').addEventListener('click', () => { cameraPosition.z -= moveSpeed; });
        document.getElementById('move-back').addEventListener('click', () => { cameraPosition.z += moveSpeed; });
        document.getElementById('move-left').addEventListener('click', () => { cameraPosition.x -= moveSpeed; });
        document.getElementById('move-right').addEventListener('click', () => { cameraPosition.x += moveSpeed; });
        
        const socket = io();
        const username = '{{ session.get("user_name", "طالب") }}';
        const roomId = '{{ room_id }}';
        socket.emit('join_classroom', { room: roomId, username: username });
        
        function createStudentAvatar(studentName, color = '#4f46e5') {
            const div = document.createElement('div');
            div.style.backgroundColor = color;
            div.style.color = 'white';
            div.style.padding = '8px 12px';
            div.style.borderRadius = '40px';
            div.style.fontSize = '14px';
            div.style.fontWeight = 'bold';
            div.style.display = 'flex';
            div.style.alignItems = 'center';
            div.style.gap = '8px';
            div.innerHTML = `<i class="fas fa-user-graduate"></i> ${escapeHtml(studentName)}`;
            return new CSS2DObject(div);
        }
        
        const students = {};
        socket.on('user_joined', (data) => {
            const avatar = createStudentAvatar(data.username, '#4f46e5');
            avatar.position.set((Math.random() - 0.5) * 3, 0, (Math.random() - 0.5) * 3 - 2);
            scene.add(avatar);
            students[data.username] = avatar;
            updateParticipantsList();
        });
        socket.on('user_left', (data) => {
            if (students[data.username]) {
                scene.remove(students[data.username]);
                delete students[data.username];
            }
            updateParticipantsList();
        });
        
        function updateParticipantsList() {
            const container = document.getElementById('participants-list');
            const participants = Object.keys(students).length + 1;
            document.getElementById('online-count').innerText = participants;
            container.innerHTML = `<div class="participant"><i class="fas fa-circle" style="color: #10b981;"></i> أنت (${username})</div>`;
            Object.entries(students).forEach(([name]) => {
                const div = document.createElement('div');
                div.className = 'participant';
                div.innerHTML = `<i class="fas fa-circle" style="color: #94a3b8;"></i> ${name}`;
                container.appendChild(div);
            });
        }
        
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        function addMessage(sender, message, isOwn = false) {
            const div = document.createElement('div');
            div.className = `chat-message ${isOwn ? 'own' : ''}`;
            div.innerHTML = `<strong>${escapeHtml(sender)}</strong><br>${escapeHtml(message)}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        document.getElementById('send-chat').addEventListener('click', () => {
            const msg = chatInput.value.trim();
            if (!msg) return;
            socket.emit('chat_message', { room: roomId, message: msg, username: username });
            addMessage(username, msg, true);
            chatInput.value = '';
        });
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('send-chat').click(); });
        socket.on('chat_message', (data) => { if (data.username !== username) addMessage(data.username, data.message); });
        
        let chatVisible = false;
        document.getElementById('toggle-chat').addEventListener('click', () => {
            chatVisible = !chatVisible;
            document.getElementById('chat-container').style.display = chatVisible ? 'flex' : 'none';
        });
        document.getElementById('exit-room').addEventListener('click', () => { window.location.href = '/dashboard'; });
        
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            updateCamera();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        const myAvatar = createStudentAvatar(username, '#10b981');
        myAvatar.position.set(0, 0, 0);
        scene.add(myAvatar);
        students[username] = myAvatar;
        animate();
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        addMessage('النظام', '🎉 مرحباً بك في الفصل الافتراضي ثلاثي الأبعاد! يمكنك التحرك باستخدام الأسهم، والكتابة في الدردشة');
        updateParticipantsList();
    </script>
</body>
</html>
